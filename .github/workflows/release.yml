name: release

# Triggers on tag push (v0.2.0 etc.). The companion `task release X.Y.Z`
# bumps version files, commits, tags, and pushes — this workflow takes
# over from the tag landing on the remote.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    # Each row builds its native bundle and uploads to the same draft
    # release; tauri-action handles release de-duplication. fail-fast
    # off so a flaky runner on one OS doesn't kill the other.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization. tauri-action imports
          # the .p12 into a temporary keychain on macos runners and
          # ignores these on windows. Without notarization Gatekeeper
          # quarantines the .app on first download; with it the user
          # gets a clean double-click experience.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'Owly v__VERSION__'
          # Draft so a bad build can be deleted before users check
          # latest.json. Promote to published once the artifact is
          # smoke-tested.
          releaseDraft: true
          args: ${{ matrix.args }}
