function clearRowHighlight(){
  document.querySelectorAll('.hz-grid tr.highlighted').forEach(tr=>tr.classList.remove('highlighted'));
  document.querySelectorAll('.hz-bl-item.hl').forEach(i=>i.classList.remove('hl'));
}

function makeGauge(pct,color,title,sub){
  const r=19,c=2*Math.PI*r,off=c*(1-pct/100);
  return`<div class="rv-gauge"><div class="rv-gauge-ring"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="${r}" fill="none" stroke="var(--bg-tint-1)" stroke-width="5"/><circle cx="24" cy="24" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div class="rv-gauge-val" style="color:${color}">${pct}%</div></div><div class="rv-gauge-info"><div class="rv-gi-title">${title}</div><div class="rv-gi-sub">${sub}</div></div></div>`;
}

function renderReviewWeek(R){
  const grid=document.createElement('div');grid.className='rv-grid';
  const totalBlocks=blocks.length,doneBlocks=blocks.filter(b=>b.done).length;
  const execPct=totalBlocks?Math.round(doneBlocks/totalBlocks*100):0;
  const totalH=blocks.reduce((s,b)=>s+b.dur/60,0),doneH=blocks.filter(b=>b.done).reduce((s,b)=>s+b.dur/60,0);
  const poolDone=poolItems.filter(pi=>pi.splittable?(pi.scheduled||0)>=pi.hours:pi.placed).length;
  const poolPct=poolItems.length?Math.round(poolDone/poolItems.length*100):0;
  const cadDirs=directions.filter(d=>d.cadence!==null);
  const cadOk=cadDirs.filter(d=>{const ds=Math.round((TODAY-new Date(d.lastAct))/864e5);return ds<=d.cadence}).length;

  const maxCH=Math.max(...Object.values(catHours),1);

    catHtml+=`<div class="rv-chart-col"><div class="rv-chart-bar" style="height:100%">`;
    ['work','growth','health','life','people'].forEach(ck=>{
      const h=dh[ck]||0;if(h>0){const pct=h/16*100;catHtml+=`<div style="height:${pct}%;background:${cc(ck)}"></div>`}

    catHtml+=`</div><span class="rv-chart-label">${DAYS[d].slice(0,2)}</span></div>`;

// Toast

  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<div class="toast-dot" style="background:${cc(cat||'work')}"></div>${text}`;

// Category picker popup (replaces dot cycling)
function showCatPicker(anchorEl,selected,onSelect){
  closeCatPicker();
  const rect=anchorEl.getBoundingClientRect();
  const pop=document.createElement('div');pop.className='cat-popup';pop.id='catPickerPop';
  pop.style.left=(rect.left)+'px';pop.style.top=(rect.bottom+4)+'px';
  pop.innerHTML=Object.entries(CATS).map(([k,v])=>
    `<div class="cat-popup-item ${k===selected?'active':''}" data-cat="${k}"><div class="cp-dot" style="background:${v.c}"></div>${v.l}</div>`
  ).join('');
  document.body.appendChild(pop);

    item.onclick=e=>{e.stopPropagation();onSelect(item.dataset.cat);closeCatPicker()};

}

document.addEventListener('keydown',e=>{

  if(e.key==='Escape'){closeQuickAdd();closeEntityPopup();closeCatPicker()}

function openQuickAdd(){
  if(qaOpen)return;qaOpen=true;
  const tab=activeTab();
  const typeMap={plan:'pool',tasks:'task',proj:'project',ctx:'direction',horizon:'project',review:'task'};
  const type=typeMap[tab]||'task';
  const typeLabels={task:'Задача',project:'Проект',direction:'Направление',pool:'В пул'};
  let selCat='work',selType=type;
  const ov=document.createElement('div');ov.className='qa-overlay';ov.id='qaOverlay';
  ov.innerHTML=`<div class="qa-bar"><div class="qa-input-row"><input id="qaInput" placeholder="${typeLabels[type]}..." autocomplete="off"><button class="qa-submit" id="qaSubmit">↵</button></div><div class="qa-type-hint"><kbd>⌘N</kbd> Тип: ${typeLabels[type]} (по контексту экрана)</div><div class="qa-extras" id="qaExtras">${catDots('qaExtras',selCat,c=>selCat=c)}<div class="qa-sep"></div><button class="qa-opt ${selType==='task'?'on':''}" data-t="task">Задача</button><button class="qa-opt ${selType==='project'?'on':''}" data-t="project">Проект</button><button class="qa-opt ${selType==='direction'?'on':''}" data-t="direction">Направление</button></div></div>`;
  document.body.appendChild(ov);
  const inp=document.getElementById('qaInput');
  setTimeout(()=>inp.focus(),50);
  // Type toggles
  ov.querySelectorAll('.qa-opt[data-t]').forEach(b=>b.onclick=()=>{
    ov.querySelectorAll('.qa-opt[data-t]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');selType=b.dataset.t;
    inp.placeholder={task:'Задача...',project:'Проект...',direction:'Направление...'}[selType];
  });
  // Submit
  const submit=()=>{
    const title=inp.value.trim();if(!title){closeQuickAdd();return}
    // Parse inline modifiers
    let deadline=null;
    const dMatch=title.match(/!(\S+)/);
    const cleanTitle=title.replace(/!(\S+)/g,'').replace(/@(\S+)/g,'').trim();
    if(dMatch){
      const d=dMatch[1];
      if(d==='завтра')deadline='2026-04-29';
      else if(d==='послезавтра')deadline='2026-04-30';
      else if(d.match(/^\d/))deadline='2026-'+d.replace('.','-');
    }
    if(selType==='task'){
      tasks.unshift({id:'t'+(nxtB++),title:cleanTitle,cat:selCat,prio:'medium',deadline,done:false});
      toast('Задача создана',selCat);
    } else if(selType==='project'){
      const pid='pr'+(nxtB++);
      projects.push({id:pid,title:cleanTitle,cat:selCat,bid:'brd3',col:0,dirId:null,la:0});
      hzSize[pid]='mid';hzPrio[pid]='active';
      toast('Проект создан',selCat);
    } else if(selType==='direction'){
      directions.push({id:'dir-'+(nxtB++),title:cleanTitle,cat:selCat,target:null,current:null,progress:null,deadline:null,cadence:null,lastAct:null,cadLbl:null});
      toast('Направление создано',selCat);
    }
    closeQuickAdd();
    // Refresh current view
    const t=activeTab();
    if(t==='tasks')renderTasksView();
    if(t==='proj')renderProjects();
    if(t==='ctx')renderContext();
    if(t==='horizon')renderHorizon();
    renderSideList();
  };
  document.getElementById('qaSubmit').onclick=submit;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
  ov.onclick=e=>{if(e.target===ov)closeQuickAdd()};
}
function closeQuickAdd(){const ov=document.getElementById('qaOverlay');if(ov)ov.remove();qaOpen=false}

// ===== ENTITY POPUP (replaces detail panel) =====
function openEntityPopup(type,data,anchorEl){
  closeEntityPopup();
  const ep=document.createElement('div');ep.className='entity-popup';ep.id='entityPopup';
  // Position near anchor — tasks: below/above left-aligned; projects: right of card
  if(anchorEl){
    const r=anchorEl.getBoundingClientRect();
    if(type==='task'){
      // Below the row, left-aligned (or above if no space below)
      const spaceBelow=window.innerHeight-r.bottom;
      if(spaceBelow>=280){
        ep.style.left=Math.max(8,r.left)+'px';
        ep.style.top=(r.bottom+4)+'px';
      } else {
        ep.style.left=Math.max(8,r.left)+'px';
        ep.style.top=Math.max(8,r.top-280)+'px';
      }
    } else {
      // Right of the element
      ep.style.left=Math.min(r.right+8,window.innerWidth-280)+'px';
      ep.style.top=Math.max(8,Math.min(r.top,window.innerHeight-300))+'px';
    }
  } else {
    ep.style.left='50%';ep.style.top='30%';ep.style.transform='translate(-50%,-50%)';
  }

  // Helper: inline category dots for popup
  function epCatDotsHtml(sel){
    return Object.entries(CATS).map(([k,v])=>`<div class="ep-cat-dot ${k===sel?'on':''}" data-cat="${k}" data-tooltip="${v.l}" style="background:${v.c}"></div>`).join('');
  }
  function setupEpCatDots(ep,data,renderFn){
    ep.querySelectorAll('.ep-cat-dot').forEach(d=>{
      d.onclick=e=>{e.stopPropagation();
        ep.querySelectorAll('.ep-cat-dot').forEach(x=>x.classList.remove('on'));
        d.classList.add('on');data.cat=d.dataset.cat;renderFn()};
    });
  }

  if(type==='task'){
    ep.innerHTML=`<div class="ep-title"><input id="epTitle" value="${data.title}"><button class="ep-close" id="epClose">×</button></div>
      <div class="ep-field"><div class="ep-label">Категория</div><div class="ep-row" style="gap:8px">${epCatDotsHtml(data.cat)}</div></div>
      <div class="ep-field"><div class="ep-label">Приоритет</div><div class="ep-prio"><button data-p="high" class="${data.prio==='high'?'on':''}">⚡ Высокий</button><button data-p="medium" class="${data.prio==='medium'?'on':''}">● Средний</button><button data-p="low" class="${data.prio==='low'?'on':''}">○ Низкий</button></div></div>
      <div class="ep-field"><div class="ep-label">Дедлайн</div><div class="ep-row"><input type="date" id="epDeadline" value="${data.deadline||''}"></div></div>
      <div class="ep-actions"><button class="ep-action danger" id="epDelete"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M4.5 3V2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M5 5.5v3M7 5.5v3M3 3l.5 7a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1L9 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Удалить</button></div>`;
    document.body.appendChild(ep);
    setupEpCatDots(ep,data,()=>{renderTasksView();renderSideList()});
    ep.querySelectorAll('.ep-prio button').forEach(b=>b.onclick=()=>{
      ep.querySelectorAll('.ep-prio button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      data.prio=b.dataset.p;renderTasksView();
    });
    ep.querySelector('#epTitle').onchange=e=>{data.title=e.target.value;renderTasksView();renderSideList()};
    ep.querySelector('#epDeadline').onchange=e=>{data.deadline=e.target.value||null;renderTasksView()};
    ep.querySelector('#epDelete').onclick=()=>{tasks=tasks.filter(t=>t.id!==data.id);closeEntityPopup();renderTasksView();renderSideList();toast('Задача удалена',data.cat)};
  } else if(type==='project'){
    ep.innerHTML=`<div class="ep-title"><input id="epTitle" value="${data.title}"><button class="ep-close" id="epClose">×</button></div>
      <div class="ep-field"><div class="ep-label">Категория</div><div class="ep-row" style="gap:8px">${epCatDotsHtml(data.cat)}</div></div>
      <div class="ep-field"><div class="ep-label">Тип</div><div class="ep-row"><select id="epBoard">${boards.map(b=>`<option value="${b.id}" ${b.id===data.bid?'selected':''}>${b.title}</option>`).join('')}</select></div></div>
      <div class="ep-field"><div class="ep-label">Направление</div><div class="ep-row"><select id="epDir"><option value="">—</option>${directions.map(d=>`<option value="${d.id}" ${d.id===data.dirId?'selected':''}>${d.title}</option>`).join('')}</select></div></div>`;
    document.body.appendChild(ep);
    setupEpCatDots(ep,data,()=>{renderProjects()});
    ep.querySelector('#epTitle').onchange=e=>{data.title=e.target.value;renderProjects();renderContext()};
    ep.querySelector('#epBoard').onchange=e=>{data.bid=e.target.value;data.col=0;renderProjects()};
    ep.querySelector('#epDir').onchange=e=>{data.dirId=e.target.value||null;renderContext()};
  } else if(type==='direction'){
    const hasCad=data.cadence!==null;
    const hasMeas=data.progress!==null;
    ep.innerHTML=`<div class="ep-title"><input id="epTitle" value="${data.title}"><button class="ep-close" id="epClose">×</button></div>
      <div class="ep-field"><div class="ep-label">Категория</div><div class="ep-row" style="gap:8px">${epCatDotsHtml(data.cat)}</div></div>
      <div class="ep-field"><div class="ep-label">Каденция (дни, 0 = нет)</div><div class="ep-row"><input type="number" id="epCadence" value="${data.cadence||0}" min="0" step="1"></div></div>
      <div class="ep-field"><div class="ep-label">Метка каденции</div><div class="ep-row"><input id="epCadLabel" value="${data.cadLbl||''}" placeholder="1×/нед"></div></div>
      ${hasMeas?`<div class="ep-field"><div class="ep-label">Цель</div><div class="ep-row"><input id="epTarget" value="${data.target||''}"></div></div>
      <div class="ep-field"><div class="ep-label">Текущее</div><div class="ep-row"><input id="epCurrent" value="${data.current||''}"></div></div>`:''}
      <div class="ep-actions"><button class="ep-action danger" id="epDelete"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M4.5 3V2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M5 5.5v3M7 5.5v3M3 3l.5 7a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1L9 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Удалить</button></div>`;
    document.body.appendChild(ep);
    setupEpCatDots(ep,data,()=>{renderContext();renderSideList()});
    ep.querySelector('#epTitle').onchange=e=>{data.title=e.target.value;renderContext();renderSideList()};
    ep.querySelector('#epCadence').onchange=e=>{const v=parseInt(e.target.value)||0;data.cadence=v||null;if(!v)data.lastAct=null;renderContext()};
    ep.querySelector('#epCadLabel').onchange=e=>{data.cadLbl=e.target.value||null;renderContext()};
    if(hasMeas){
      ep.querySelector('#epTarget').onchange=e=>{data.target=e.target.value;renderContext()};
      ep.querySelector('#epCurrent').onchange=e=>{data.current=e.target.value;renderContext()};
    }
    ep.querySelector('#epDelete').onclick=()=>{
      const idx=directions.findIndex(d=>d.id===data.id);if(idx>=0)directions.splice(idx,1);
      // Unlink projects
      projects.forEach(p=>{if(p.dirId===data.id)p.dirId=null});
      closeEntityPopup();renderContext();renderSideList();toast('Направление удалено',data.cat);
    };
  }
  ep.querySelector('#epClose').onclick=closeEntityPopup;
  // Close on outside click (delayed to avoid immediate close)
  setTimeout(()=>{
    const handler=e=>{if(!ep.contains(e.target)&&!e.target.closest('.cat-popup')){closeEntityPopup();document.removeEventListener('mousedown',handler)}};
    document.addEventListener('mousedown',handler);
  },50);
}
function closeEntityPopup(){const ep=document.getElementById('entityPopup');if(ep)ep.remove()}
// Aliases for backward compat
function openDetail(type,data,anchor){openEntityPopup(type,data,anchor)}
function closeDetail(){closeEntityPopup()}

// ===== SEARCH / ADD BAR: TASKS VIEW =====
let taskAddCat='life';
const SEARCH_ICON='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';
const PLUS_ICON='<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
let _tbOutsideHandler=null;
function tbSetAdd(){
  const left=document.getElementById('tbLeft');
  const right=document.getElementById('tbRight');
  if(!left||!right)return;
  left.className='tb-left as-field';
  right.className='tb-right hidden';
  setTimeout(()=>{const inp=left.querySelector('input');if(inp)inp.focus()},50);
  // Click outside → dismiss
  if(_tbOutsideHandler)document.removeEventListener('mousedown',_tbOutsideHandler);
  setTimeout(()=>{
    _tbOutsideHandler=e=>{
      if(!left.contains(e.target)&&!e.target.closest('.cat-popup')){
        tbSetSearch();document.removeEventListener('mousedown',_tbOutsideHandler);_tbOutsideHandler=null;
      }
    };
    document.addEventListener('mousedown',_tbOutsideHandler);
  },50);
}
function tbSetSearch(){
  const left=document.getElementById('tbLeft');
  const right=document.getElementById('tbRight');
  if(!left||!right)return;
  left.className='tb-left as-btn';
  right.className='tb-right';
  left.querySelector('input').value='';
  if(_tbOutsideHandler){document.removeEventListener('mousedown',_tbOutsideHandler);_tbOutsideHandler=null}
}
const origRenderTasksView=renderTasksView;
renderTasksView=function(){
  origRenderTasksView();
  const TI=document.getElementById('tasksInner');if(!TI)return;
  const head=TI.querySelector('.tv-head');if(!head)return;
  const wrap=document.createElement('div');wrap.className='task-bar-wrap';
  // Left: morphs between + button and add field
  const left=document.createElement('div');left.id='tbLeft';left.className='tb-left as-btn';
  left.innerHTML=`<span class="tb-plus-icon">${PLUS_ICON}</span><div class="tb-dot" style="background:${cc(taskAddCat)}" id="tbDot"></div><input placeholder="Новая задача… Enter" id="tbAddInput"><button class="tb-x" id="tbAddClose">✕</button>`;
  // Right: search field
  const right=document.createElement('div');right.id='tbRight';right.className='tb-right';
  right.innerHTML=`<span class="tb-icon">${SEARCH_ICON}</span><input placeholder="Поиск задач..." value="${taskSearch}" id="tbSearchInput">${taskSearch?'<button class="tb-x" id="tbSearchClear">✕</button>':''}`;
  wrap.appendChild(left);wrap.appendChild(right);
  head.after(wrap);
  // Left: click as button → expand
  left.onclick=e=>{if(left.classList.contains('as-btn'))tbSetAdd()};
  // Left: dot click
  const dot=left.querySelector('#tbDot');
  dot.onclick=e=>{e.stopPropagation();showCatPicker(dot,taskAddCat,c=>{taskAddCat=c;dot.style.background=cc(c)})};
  // Left: close button
  left.querySelector('#tbAddClose').onclick=e=>{e.stopPropagation();tbSetSearch()};
  // Left: input keydown
  left.querySelector('#tbAddInput').addEventListener('keydown',e=>{
    const inp=e.target;
    if(e.key==='Enter'&&inp.value.trim()){
      const title=inp.value.trim();
      tasks.unshift({id:'t'+(nxtB++),title,cat:taskAddCat,prio:'medium',deadline:null,done:false});
      toast('✓ '+title,taskAddCat);inp.value='';
      renderTasksView();renderSideList();
      setTimeout(()=>tbSetAdd(),10);return;
    }
    if(e.key==='Escape')tbSetSearch();
  });
  // Right: search input
  const searchInp=right.querySelector('#tbSearchInput');
  searchInp.addEventListener('input',()=>{
    taskSearch=searchInp.value;const p=searchInp.selectionStart;
    renderTasksView();
    const ni=document.getElementById('tbSearchInput');if(ni){ni.focus();ni.selectionStart=ni.selectionEnd=p}
  });
  searchInp.addEventListener('keydown',e=>{if(e.key==='Escape'){taskSearch='';renderTasksView()}});
  const sc=right.querySelector('#tbSearchClear');
  if(sc)sc.onclick=()=>{taskSearch='';renderTasksView()};
  // Task rows clickable
  TI.querySelectorAll('.task-row').forEach(row=>{
    const check=row.querySelector('.tr-check');
    const tid=check?.dataset.id;if(!tid)return;
    row.style.cursor='pointer';
    row.onclick=e=>{if(e.target.closest('.tr-check'))return;
      const t=tasks.find(x=>x.id===tid);if(t)openDetail('task',t,row)};
  });
};

// ===== INLINE CREATION: KANBAN =====
const origRenderProjects=renderProjects;
renderProjects=function(){
  origRenderProjects();
  // Add "+" at bottom of each kanban column
  document.querySelectorAll('.kanban-cards').forEach(cd=>{
    const colIdx=parseInt(cd.dataset.col);
    const trig=document.createElement('div');trig.className='add-trigger';
    trig.innerHTML=`<span class="at-plus">+</span> Проект`;
    let adding=false;
    trig.onclick=()=>{
      if(adding)return;adding=true;
      trig.style.display='none';
      const ia=document.createElement('div');ia.className='inline-add';
      let iaCat='work';
      ia.innerHTML=`<div class="ia-dot" style="background:${cc(iaCat)}"></div><input placeholder="Название..." autofocus>`;
      cd.appendChild(ia);
      const inp=ia.querySelector('input');
      const dot=ia.querySelector('.ia-dot');
      dot.onclick=e=>{e.stopPropagation();showCatPicker(dot,iaCat,c=>{iaCat=c;dot.style.background=cc(c)})};
      setTimeout(()=>inp.focus(),30);
      const finish=()=>{
        const title=inp.value.trim();
        if(title){
          const pid='pr'+(nxtB++);
          projects.push({id:pid,title,cat:iaCat,bid:activeBoard,col:colIdx,dirId:null,la:0});
          hzSize[pid]='mid';hzPrio[pid]='active';
          toast('✓ '+title,iaCat);
        }
        adding=false;renderProjects();renderSideList();
      };
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')finish();if(e.key==='Escape'){adding=false;renderProjects()}});
      inp.addEventListener('blur',()=>setTimeout(finish,100));
    };
    cd.appendChild(trig);
  });
  // Make kanban cards clickable for detail
  document.querySelectorAll('.kanban-card').forEach(card=>{
    card.style.cursor='pointer';
    card.addEventListener('click',e=>{
      if(e.target.closest('.btn-pool'))return;
      // Find project by title (simplified for demo)
      const title=card.querySelector('.kc-title')?.textContent;
      const p=projects.find(x=>x.title===title);
      if(p)openDetail('project',p,card);
    });
  });
};

// ===== INLINE CREATION: CONTEXT VIEW =====
const origRenderContext=renderContext;
renderContext=function(){
  origRenderContext();
  const V=document.getElementById('view-ctx');
  // Add "+" trigger in each category section for new direction (no dot — category obvious from section)
  V.querySelectorAll('.dir-grid').forEach(grid=>{
    // Detect cat from section
    const section=grid.closest('.cat-section');
    const dotEl=section?.querySelector('.cs-dot');
    let secCat='work';
    if(dotEl){Object.entries(CATS).forEach(([k,v])=>{if(dotEl.style.background===v.c)secCat=k})}
    const trig=document.createElement('div');trig.className='add-trigger';
    trig.style.cssText='margin-top:6px;max-width:300px';
    trig.innerHTML=`<span class="at-plus">+</span> Направление`;
    trig.onclick=()=>{
      trig.style.display='none';
      const ia=document.createElement('div');ia.className='inline-add';
      ia.style.maxWidth='300px';
      ia.innerHTML=`<input placeholder="Название направления..." style="padding-left:2px">`;
      grid.after(ia);
      const inp=ia.querySelector('input');setTimeout(()=>inp.focus(),30);
      const finish=()=>{
        const title=inp.value.trim();
        if(title){
          directions.push({id:'dir-'+(nxtB++),title,cat:secCat,target:null,current:null,progress:null,deadline:null,cadence:null,lastAct:null,cadLbl:null});
          toast('✓ '+title,secCat);
        }
        renderContext();
      };
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')finish();if(e.key==='Escape')renderContext()});
      inp.addEventListener('blur',()=>setTimeout(finish,100));
    };
    grid.after(trig);
  });
  // Add "+" on direction cards to create linked project (no dot — category from direction)
  V.querySelectorAll('.dir-card').forEach(card=>{
    const actions=card.querySelector('.dc-actions');if(!actions)return;
    const dirTitle=card.querySelector('.dc-title')?.textContent;
    const dir=directions.find(d=>d.title===dirTitle);if(!dir)return;
    const btn=document.createElement('button');btn.className='btn-pool';btn.textContent='+ Проект';
    btn.style.cssText='border-color:var(--text-tertiary);color:var(--text-tertiary)';
    btn.onclick=e=>{e.stopPropagation();
      btn.style.display='none';
      const ia=document.createElement('div');ia.className='inline-add';ia.style.marginTop='6px';
      ia.innerHTML=`<input placeholder="Проект для «${dir.title}»..." style="padding-left:2px">`;
      card.appendChild(ia);
      const inp=ia.querySelector('input');setTimeout(()=>inp.focus(),30);
      const finish=()=>{
        const title=inp.value.trim();
        if(title){
          const pid='pr'+(nxtB++);
          projects.push({id:pid,title,cat:dir.cat,bid:'brd3',col:0,dirId:dir.id,la:0});
          hzSize[pid]='mid';hzPrio[pid]='active';
          toast('✓ '+title+' → '+dir.title,dir.cat);
        }
        renderContext();renderProjects();renderSideList();
      };
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')finish();if(e.key==='Escape')renderContext()});
      inp.addEventListener('blur',()=>setTimeout(finish,100));
    };
    actions.appendChild(btn);
  });
  // Make direction cards clickable for editing
  V.querySelectorAll('.dir-card').forEach(card=>{
    const dirTitle=card.querySelector('.dc-title')?.textContent;
    const dir=directions.find(d=>d.title===dirTitle);if(!dir)return;
    card.querySelector('.dc-top').style.cursor='pointer';
    card.querySelector('.dc-top').onclick=e=>{
      if(e.target.closest('.btn-pool')||e.target.closest('.btn-cadence'))return;
      openEntityPopup('direction',dir,card);
    };
  });
  // Make direction-card projects clickable — inline editor expands below the row
  V.querySelectorAll('.dc-proj').forEach(projEl=>{
    const pid=projEl.dataset.pid;
    const proj=projects.find(p=>p.id===pid);if(!proj)return;
    projEl.onclick=e=>{
      if(e.target.closest('.dc-unlink'))return;
      e.stopPropagation();
      // Toggle: if editor already open for this project, close it
      const existing=projEl.nextElementSibling;
      if(existing&&existing.classList.contains('dc-proj-edit')&&existing.dataset.pid===pid){
        existing.remove();return;
      }
      // Close any other open editors
      V.querySelectorAll('.dc-proj-edit').forEach(x=>x.remove());
      // Create inline editor — title as plain editable input, type as tag chips
      const edit=document.createElement('div');edit.className='dc-proj-edit';edit.dataset.pid=pid;
      const tagsHtml=boards.map(b=>`<button class="dpe-tag ${b.id===proj.bid?'on':''}" data-bid="${b.id}">${b.title}</button>`).join('');
      edit.innerHTML=`<input class="dpe-title" value="${proj.title}" placeholder="Название проекта"><div class="dpe-tags">${tagsHtml}</div>`;
      projEl.after(edit);
      const titleInput=edit.querySelector('.dpe-title');
      titleInput.focus();titleInput.select();
      titleInput.onchange=ev=>{proj.title=ev.target.value;renderContext();renderProjects()};
      // Tag chip clicks
      edit.querySelectorAll('.dpe-tag').forEach(tag=>{
        tag.onclick=ev=>{
          ev.stopPropagation();
          edit.querySelectorAll('.dpe-tag').forEach(t=>t.classList.remove('on'));
          tag.classList.add('on');
          proj.bid=tag.dataset.bid;proj.col=0;
          // Update the project row text above without full re-render
          renderProjects();
        };
      });
      // Click outside closes
      edit.onclick=ev=>ev.stopPropagation();
      setTimeout(()=>{const h=ev=>{if(!edit.contains(ev.target)&&!projEl.contains(ev.target)){edit.remove();document.removeEventListener('mousedown',h)}};document.addEventListener('mousedown',h)},50);
    };
  });
};

// ===== NAV ADD BUTTON =====
document.getElementById('navAddBtn').onclick=()=>openQuickAdd();

// ===== WEEK NAVIGATION =====
function updateWeekLabel(){
  const lbl=getWeekLabel();
  document.getElementById('wkLabel').textContent=lbl;
  document.getElementById('wkToday').classList.toggle('current',weekOffset===0);
  const wn=lbl.match(/W\d+/)?.[0]||'';
  document.getElementById('poolTitle').textContent='ПУЛ · '+wn;
}
function switchWeek(dir){
  weekOffset+=dir;DAYS=getDayLabels();updateWeekLabel();buildGrid();
}
document.getElementById('wkPrev').onclick=()=>switchWeek(-1);
document.getElementById('wkNext').onclick=()=>switchWeek(1);
document.getElementById('wkToday').onclick=()=>{weekOffset=0;DAYS=getDayLabels();updateWeekLabel();buildGrid()};

// ===== INIT =====
updateWeekLabel();
buildGrid();renderSideList();renderBudget();
</script>
</body>
</html>
