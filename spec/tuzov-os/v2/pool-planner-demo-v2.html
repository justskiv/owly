<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TuzovOS — Pyramid Demo v2</title>
<style>
:root{
  --bg-base:#0D0D12;--bg-surface:#16161E;--bg-tint-1:#1E1E28;--bg-tint-2:#26263A;
  --text-primary:#E8E8ED;--text-secondary:#A0A0B0;--text-tertiary:#6A6A7A;--text-disabled:#484858;
  --accent:#D4A843;--success:#30D888;--error:#E06878;--warning:#E8A735;
  --border:rgba(255,255,255,.08);--border-hover:rgba(255,255,255,.15);
  --work:#FF7A3D;--people:#FF5CA8;--life:#B8D84A;--growth:#9B6CFF;--health:#30D888;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;
  --fs-2xs:10px;--fs-xs:11px;--fs-sm:12px;--fs-md:14px;--fs-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
*::-webkit-scrollbar{width:6px;height:6px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
*::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-base);color:var(--text-primary);overflow:hidden;height:100vh;user-select:none}
.app{display:flex;flex-direction:column;height:100vh}
.top-nav{display:flex;align-items:center;background:var(--bg-surface);border-bottom:1px solid var(--border);padding:0 16px;height:40px;gap:2px;flex-shrink:0}
.nav-tab{padding:8px 14px;font-size:var(--fs-sm);font-weight:600;color:var(--text-tertiary);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;height:40px;transition:all .12s}
.nav-tab:hover{color:var(--text-secondary)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-spacer{flex:1}
.nav-week{font-size:var(--fs-sm);font-family:'SF Mono','Fira Code',monospace;color:var(--text-primary);display:flex;align-items:center;gap:6px}
.wk-arrow{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid transparent;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:16px;cursor:pointer;transition:all .12s;flex-shrink:0}
.wk-arrow:hover{border-color:var(--border-hover);background:var(--bg-tint-1);color:var(--text-primary)}
.wk-today{margin-right:4px;padding:2px 8px;background:none;border:1px solid transparent;border-radius:var(--radius-sm);color:var(--text-tertiary);font-size:var(--fs-2xs);cursor:pointer;transition:all .12s;white-space:nowrap}
.wk-today:hover{border-color:var(--accent);color:var(--accent)}
.wk-today.current{display:none}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex}

/* Grid */
.plan-view{overflow:hidden}
.grid-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.grid-scroll{flex:1;overflow-y:auto;display:flex}
.time-gutter{width:48px;flex-shrink:0}
.time-gutter .tl{height:40px;text-align:right;padding:2px 6px 0 0;font-size:var(--fs-2xs);color:var(--text-disabled);font-family:'SF Mono','Fira Code',monospace}
.day-cols{display:flex;flex:1}
.day-col-wrap{flex:1;display:flex;flex-direction:column}
.day-head{height:32px;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);font-weight:600;color:var(--text-tertiary);background:var(--bg-surface);border-bottom:1px solid var(--border);border-left:1px solid var(--border);position:sticky;top:0;z-index:10}
.day-body{position:relative;border-left:1px solid var(--border)}
.hour-line{position:absolute;left:0;right:0;border-top:1px solid var(--border)}
.block{position:absolute;left:3px;right:3px;border-radius:var(--radius-sm);padding:3px 6px;font-size:var(--fs-2xs);cursor:grab;overflow:hidden;z-index:2;border-left:3px solid}
.block .b-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.block .b-time{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px}
.block.done{opacity:.35}.block.done .b-title{text-decoration:line-through}
.block.selected{outline:2px solid var(--accent);outline-offset:1px;z-index:3}
.block .resize-handle{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize}
.block .resize-handle::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:24px;height:2px;border-radius:1px;background:rgba(255,255,255,.15)}
.block:hover .resize-handle::after{background:rgba(255,255,255,.35)}
.drop-indicator{position:absolute;left:3px;right:3px;height:2px;background:var(--accent);border-radius:1px;z-index:5;pointer-events:none;display:none}
.ghost-block{position:fixed;pointer-events:none;z-index:100;border-radius:var(--radius-sm);padding:3px 6px;font-size:var(--fs-2xs);opacity:.75;border-left:3px solid}

/* Pool sidebar */
.pool-sidebar{width:280px;flex-shrink:0;background:var(--bg-surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pool-header{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);gap:8px}
.pool-header h3{font-size:var(--fs-sm);font-weight:700;color:var(--text-secondary);flex:1}
.btn-sm{width:24px;height:24px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:var(--fs-md);display:flex;align-items:center;justify-content:center}
.btn-sm:hover{border-color:var(--border-hover);color:var(--text-primary)}
.budget{padding:8px 12px;border-bottom:1px solid var(--border)}
.budget-row{display:flex;justify-content:space-between;font-size:var(--fs-xs);padding:1px 0;color:var(--text-secondary)}
.budget-row.indent{padding-left:12px}
.budget-row .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.budget-bar{height:5px;border-radius:3px;background:var(--bg-tint-1);margin-top:5px;overflow:hidden;display:flex}
.budget-bar span{height:100%}
.pool-tabs{display:flex;border-bottom:1px solid var(--border)}
.pool-tab{flex:1;padding:6px 0;text-align:center;font-size:var(--fs-2xs);font-weight:600;color:var(--text-disabled);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .1s}
.pool-tab:hover{color:var(--text-tertiary)}
.pool-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.pool-list{flex:1;overflow-y:auto;padding:6px}
.pool-section{font-size:var(--fs-2xs);font-weight:700;color:var(--text-disabled);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px 3px;margin-top:2px}

/* Shared item styles */
.s-item{display:flex;align-items:center;padding:5px 8px;border-radius:var(--radius-sm);background:var(--bg-tint-1);margin-bottom:3px;gap:6px;transition:background .1s;position:relative}
.s-item:hover{background:var(--bg-tint-2)}
.s-item .s-color{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:20px}
.s-item .s-body{flex:1;min-width:0}
.s-item .s-title{font-size:var(--fs-xs);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-item .s-meta{font-size:9px;color:var(--text-tertiary);margin-top:1px;display:flex;gap:6px;align-items:center}
.s-item .s-act{width:20px;height:20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-tertiary);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.s-item .s-act:hover{border-color:var(--accent);color:var(--accent)}
.s-item .s-act.in{border-color:var(--accent);color:var(--accent);background:rgba(212,168,67,.1)}
.s-item .s-bar{height:3px;border-radius:2px;background:var(--bg-base);margin-top:3px}
.s-item .s-bar span{display:block;height:100%;border-radius:2px}
.s-item .s-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.s-item.placed{opacity:.4;cursor:default}
.s-item.done-item{opacity:.3}
.s-item.done-item .s-title{text-decoration:line-through}
.s-item.draggable{cursor:grab}
.urgency-ok{color:var(--success)}
.urgency-warn{color:var(--warning)}
.urgency-bad{color:var(--error)}

/* Context menu */
.ctx-menu{position:fixed;z-index:200;background:var(--bg-tint-2);border:1px solid var(--border-hover);border-radius:var(--radius-md);padding:4px;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ctx-menu button{display:block;width:100%;text-align:left;padding:6px 10px;font-size:var(--fs-xs);border:none;background:none;color:var(--text-primary);border-radius:var(--radius-sm);cursor:pointer}
.ctx-menu button:hover{background:var(--bg-tint-1)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-surface);border:1px solid var(--border-hover);border-radius:var(--radius-lg);padding:20px;width:340px}
.modal h3{font-size:var(--fs-lg);margin-bottom:12px}
.modal label{display:block;font-size:var(--fs-xs);color:var(--text-secondary);margin:8px 0 3px}
.modal input,.modal select{width:100%;padding:6px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tint-1);color:var(--text-primary);font-size:var(--fs-sm);outline:none}
.modal .toggle-row{display:flex;gap:6px;margin-top:4px}
.modal .toggle-btn{flex:1;padding:5px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:var(--fs-xs)}
.modal .toggle-btn.on{border-color:var(--accent);color:var(--accent)}
.modal .modal-actions{display:flex;gap:8px;margin-top:14px}
.modal .btn-primary{flex:1;padding:7px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#000;font-weight:600;cursor:pointer;font-size:var(--fs-sm)}
.modal .btn-cancel{flex:1;padding:7px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:var(--fs-sm)}

/* Quick-add bar */
.qa-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:400;display:flex;justify-content:center;padding-top:80px;animation:qaFadeIn .12s}
@keyframes qaFadeIn{from{opacity:0}to{opacity:1}}
.qa-bar{width:520px;background:var(--bg-surface);border:1px solid var(--border-hover);border-radius:var(--radius-lg);padding:0;box-shadow:0 16px 48px rgba(0,0,0,.5);animation:qaSlide .15s;overflow:hidden;height:auto;align-self:flex-start}
@keyframes qaSlide{from{transform:translateY(-12px);opacity:0}to{transform:translateY(0);opacity:1}}
.qa-input-row{display:flex;align-items:center;padding:12px 16px;gap:10px}
.qa-input-row input{flex:1;background:none;border:none;color:var(--text-primary);font-size:var(--fs-lg);outline:none;font-weight:500}
.qa-input-row input::placeholder{color:var(--text-disabled)}
.qa-type-hint{font-size:var(--fs-2xs);color:var(--text-disabled);padding:0 16px 8px;display:flex;align-items:center;gap:6px}
.qa-type-hint kbd{background:var(--bg-tint-2);padding:1px 5px;border-radius:3px;font-size:9px;font-family:inherit}
.qa-extras{border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.qa-cat-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s;display:flex;align-items:center;justify-content:center;position:relative}
.qa-cat-dot:hover{transform:scale(1.15)}
.qa-cat-dot.on{border-color:transparent;transform:scale(1.25)}
.qa-cat-dot.on::after{content:'✓';font-size:10px;color:#fff;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.qa-cat-dot[data-tooltip]:hover::before{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg-tint-2);border:1px solid var(--border-hover);color:var(--text-primary);font-size:var(--fs-2xs);padding:2px 6px;border-radius:var(--radius-sm);white-space:nowrap;pointer-events:none;z-index:10}
.qa-sep{width:1px;height:16px;background:var(--border);margin:0 4px}
.qa-opt{padding:3px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-tertiary);font-size:var(--fs-2xs);cursor:pointer;transition:all .1s}
.qa-opt:hover{border-color:var(--border-hover);color:var(--text-secondary)}
.qa-opt.on{border-color:var(--accent);color:var(--accent)}
.qa-submit{margin-left:auto;padding:5px 14px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#000;font-weight:600;font-size:var(--fs-xs);cursor:pointer;transition:all .1s}
.qa-submit:hover{filter:brightness(1.1)}

/* Inline add input */
.inline-add{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--radius-sm);background:var(--bg-tint-1);margin:4px 0;border:1px solid transparent;transition:all .15s}
.inline-add:focus-within{border-color:var(--accent);background:var(--bg-tint-2)}
.inline-add input{flex:1;background:none;border:none;color:var(--text-primary);font-size:var(--fs-xs);outline:none}
.inline-add input::placeholder{color:var(--text-disabled)}
.inline-add .ia-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .1s}
.inline-add .ia-dot:hover{transform:scale(1.3)}
.task-bar-wrap{display:flex;gap:6px;margin:6px 0;align-items:stretch;height:32px}
/* Task bar: left slot morphs between + button and add field, right slot is search (hides when adding) */
.tb-left{display:flex;align-items:center;gap:6px;border-radius:var(--radius-sm);border:1px solid transparent;background:none;overflow:hidden;transition:flex .3s ease,padding .3s ease,background .2s,border-color .3s ease,border-style 0s}
.tb-left.as-btn{flex:0 0 32px;padding:0;justify-content:center;cursor:pointer}
.tb-left.as-btn:hover{border-color:var(--border-hover);background:var(--bg-tint-1)}
.tb-left.as-field{flex:1;padding:0 10px;background:var(--bg-tint-1);border-style:dashed;border-color:rgba(212,168,67,.3)}
.tb-left.as-field:focus-within{border-color:rgba(212,168,67,.5);background:var(--bg-tint-2)}
.tb-left .tb-plus-icon{color:var(--text-tertiary);flex-shrink:0;display:flex;align-items:center}
.tb-left.as-field .tb-plus-icon{display:none}
.tb-left .tb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .1s}
.tb-left .tb-dot:hover{transform:scale(1.3)}
.tb-left.as-btn .tb-dot{display:none}
.tb-left input{flex:1;min-width:0;background:none;border:none;color:var(--text-primary);font-size:var(--fs-xs);outline:none}
.tb-left input::placeholder{color:var(--text-disabled)}
.tb-left.as-btn input{width:0;min-width:0;padding:0;margin:0;opacity:0;pointer-events:none;flex:0 0 0}
.tb-left.as-field input{opacity:1;transition:opacity .15s .1s}
.tb-left .tb-x{flex-shrink:0;border:none;background:none;color:var(--text-disabled);font-size:12px;cursor:pointer;padding:0 2px;transition:color .1s}
.tb-left .tb-x:hover{color:var(--text-primary)}
.tb-left.as-btn .tb-x{display:none}
.tb-right{flex:1;display:flex;align-items:center;gap:6px;padding:0 10px;border-radius:var(--radius-sm);background:var(--bg-tint-1);border:1px solid transparent;transition:flex .3s ease,padding .3s ease,opacity .2s}
.tb-right:focus-within{border-color:var(--border-hover);background:var(--bg-tint-2)}
.tb-right.hidden{flex:0 0 0;padding:0;opacity:0;overflow:hidden;pointer-events:none;border:none}
.tb-right .tb-icon{flex-shrink:0;display:flex;align-items:center;color:var(--text-disabled)}
.tb-right input{flex:1;min-width:0;background:none;border:none;color:var(--text-primary);font-size:var(--fs-xs);outline:none}
.tb-right input::placeholder{color:var(--text-disabled)}
.tb-right .tb-x{flex-shrink:0;border:none;background:none;color:var(--text-disabled);font-size:12px;cursor:pointer;padding:0 2px;transition:color .1s}
.tb-right .tb-x:hover{color:var(--text-primary)}
@keyframes tbGrow{from{flex:0;opacity:0;padding:0}to{flex:1;opacity:1;padding:0 10px}}
.add-trigger{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-disabled);font-size:var(--fs-2xs);transition:all .1s;border:1px dashed transparent}
.add-trigger:hover{color:var(--text-tertiary);border-color:var(--border)}
.add-trigger .at-plus{font-size:var(--fs-sm);line-height:1}

/* Detail panel (slide from right) */
.detail-panel{position:fixed;top:0;right:0;bottom:0;width:320px;background:var(--bg-surface);border-left:1px solid var(--border-hover);z-index:250;padding:16px;overflow-y:auto;box-shadow:-8px 0 24px rgba(0,0,0,.3);animation:dpSlide .15s}
@keyframes dpSlide{from{transform:translateX(320px)}to{transform:translateX(0)}}
.dp-close{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:var(--fs-sm);display:flex;align-items:center;justify-content:center}
.dp-close:hover{border-color:var(--border-hover);color:var(--text-primary)}
.dp-title{font-size:var(--fs-lg);font-weight:700;margin-bottom:14px;padding-right:32px}
.dp-title input{width:100%;background:none;border:none;border-bottom:1px solid transparent;color:var(--text-primary);font-size:var(--fs-lg);font-weight:700;outline:none;padding:2px 0}
.dp-title input:focus{border-bottom-color:var(--accent)}
.dp-field{margin-bottom:12px}
.dp-label{font-size:var(--fs-2xs);color:var(--text-disabled);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dp-cats{display:flex;gap:5px}
.dp-cat{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s;position:relative}
.dp-cat:hover{transform:scale(1.1)}
.dp-cat.on{border-color:#fff;transform:scale(1.15)}
.dp-row{display:flex;align-items:center;gap:8px}
.dp-row input,.dp-row select{flex:1;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tint-1);color:var(--text-primary);font-size:var(--fs-xs);outline:none}
.dp-row input:focus,.dp-row select:focus{border-color:var(--accent)}
.dp-prio{display:flex;gap:4px}
.dp-prio button{padding:3px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-tertiary);font-size:var(--fs-2xs);cursor:pointer;transition:all .1s}
.dp-prio button:hover{border-color:var(--border-hover)}
.dp-prio button.on{border-color:var(--accent);color:var(--accent);background:rgba(212,168,67,.08)}

/* Toast notification */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-tint-2);border:1px solid var(--border-hover);border-radius:var(--radius-md);padding:8px 16px;font-size:var(--fs-xs);color:var(--text-primary);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:500;animation:toastIn .2s;display:flex;align-items:center;gap:8px}
@keyframes toastIn{from{transform:translateX(-50%) translateY(16px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.toast .toast-dot{width:6px;height:6px;border-radius:50%}

/* Context view */
.ctx-view{flex-direction:column;padding:16px 20px;overflow-y:auto}
.cat-section{margin-bottom:16px}
.cat-section-head{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;margin-bottom:8px;border-bottom:1px solid var(--border);transition:all .12s;user-select:none}
.cat-section-head:hover{border-bottom-color:var(--border-hover)}
.cat-section-head .cs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-section-head .cs-label{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-secondary)}
.cat-section-head .cs-arrow{color:var(--text-disabled);font-size:9px;transition:transform .15s}
.cat-section-head .cs-count{font-size:var(--fs-2xs);color:var(--text-disabled);margin-left:auto}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.dir-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;transition:border-color .12s}
.dir-card:hover{border-color:var(--border-hover)}
.dir-card .dc-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.dir-card .dc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dir-card .dc-title{font-size:var(--fs-md);font-weight:600;flex:1}
.dir-card .dc-progress{height:4px;border-radius:2px;background:var(--bg-tint-1);margin:5px 0}
.dir-card .dc-progress span{display:block;height:100%;border-radius:2px}
.dir-card .dc-meta{font-size:var(--fs-xs);color:var(--text-tertiary);margin-bottom:2px}
.dir-card .dc-projects{margin-top:6px;border-top:1px solid var(--border);padding-top:5px}
.dir-card .dc-proj{font-size:var(--fs-xs);color:var(--text-secondary);padding:1px 0;display:flex;align-items:center;gap:6px}
.dir-card .dc-proj span:first-child{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dir-card .dc-proj .dc-days{flex-shrink:0;width:48px;text-align:left;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:3px;position:relative}
.dir-card .dc-proj .dc-days.fresh{color:var(--success)}
.dir-card .dc-proj .dc-days.normal{color:var(--text-disabled)}
.dir-card .dc-proj .dc-days.stale{color:var(--error)}
.dir-card .dc-proj .dc-days[data-tooltip]:hover::before{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);right:0;background:var(--bg-tint-2);border:1px solid var(--border-hover);color:var(--text-primary);font-size:var(--fs-2xs);padding:2px 6px;border-radius:var(--radius-sm);white-space:nowrap;pointer-events:none;z-index:10}
.dir-card .dc-actions{display:flex;gap:6px;margin-top:8px}
.btn-pool{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:none;color:var(--accent);font-size:var(--fs-xs);font-weight:600;cursor:pointer;transition:all .12s}
.btn-pool:hover{background:rgba(212,168,67,.1)}
.btn-pool.in{background:rgba(212,168,67,.15);border-style:dashed}
.btn-cadence{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--radius-sm);border:1px solid var(--success);background:none;color:var(--success);font-size:var(--fs-xs);font-weight:600;cursor:pointer}
.btn-cadence:hover{background:rgba(48,216,136,.1)}

/* Projects view */
.proj-view{flex-direction:column;overflow:hidden}
.board-bar{display:flex;align-items:center;padding:8px 16px;gap:4px;border-bottom:1px solid var(--border)}
.board-tab{padding:5px 10px;font-size:var(--fs-xs);font-weight:600;border-radius:var(--radius-sm);border:1px solid transparent;background:none;color:var(--text-tertiary);cursor:pointer}
.board-tab.active{background:var(--bg-tint-2);color:var(--text-primary);border-color:var(--border)}
.cat-filters{display:flex;gap:10px;margin-left:auto;align-items:center}
.cat-btn{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .1s;position:relative;display:flex;align-items:center;justify-content:center}
.cat-btn:hover{transform:scale(1.15)}
.cat-btn.active{border-color:transparent;transform:scale(1.25)}
.cat-btn.active::after{content:'✓';font-size:9px;color:#fff;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.cat-btn.all-btn{width:auto;height:auto;border-radius:var(--radius-sm);padding:2px 8px;font-size:var(--fs-2xs);color:var(--text-tertiary);background:none;border:1px solid var(--border)}
.cat-btn.all-btn:hover{border-color:var(--border-hover);color:var(--text-secondary)}
.cat-btn.all-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(212,168,67,.08);transform:none}
.cat-btn.all-btn.active::after{display:none}
.summary-bar{padding:5px 16px;font-size:var(--fs-xs);color:var(--text-tertiary);border-bottom:1px solid var(--border)}
.summary-bar .stale-link{color:var(--error);cursor:pointer;text-decoration:underline}
.kanban{display:flex;flex:1;overflow-x:auto;padding:10px;gap:8px}
.kanban-col{flex:0 0 220px;background:var(--bg-surface);border-radius:var(--radius-md);display:flex;flex-direction:column;max-height:100%}
.kanban-col-head{padding:8px 10px;font-size:var(--fs-xs);font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.kanban-col-head .count{background:var(--bg-tint-2);padding:0 5px;border-radius:8px;font-size:var(--fs-2xs)}
.kanban-cards{flex:1;overflow-y:auto;padding:5px}
.kanban-card{background:var(--bg-tint-1);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:5px;border-left:3px solid;cursor:grab;transition:background .1s}
.kanban-card:hover{background:var(--bg-tint-2)}
.kanban-card .kc-title{font-size:var(--fs-sm);font-weight:600;margin-bottom:3px}
.kanban-card .kc-meta{font-size:var(--fs-2xs);color:var(--text-tertiary);display:flex;justify-content:space-between}
.kanban-card .kc-meta .stale{color:var(--error)}
.kanban-card .kc-badge{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600}
.kanban-card .kc-pool-btn{margin-top:5px;width:100%}

/* Tasks view */
.tasks-view{flex-direction:row;padding:16px 20px;overflow-y:auto;gap:16px;justify-content:center}
.tasks-inner{width:100%;max-width:420px;flex-shrink:0}
.tasks-side{width:220px;flex-shrink:0;position:sticky;top:16px;align-self:flex-start}
.ts-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;margin-bottom:10px}
.ts-card h4{font-size:var(--fs-2xs);font-weight:700;color:var(--text-disabled);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.ts-stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:var(--fs-xs);color:var(--text-secondary)}
.ts-stat-row .ts-val{font-weight:600;color:var(--text-primary)}
.ts-cat-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:var(--fs-xs);color:var(--text-secondary);cursor:pointer;border-radius:var(--radius-sm);transition:background .1s}
.ts-cat-row:hover{background:var(--bg-tint-1)}
.ts-cat-row .ts-cd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ts-cat-row .ts-cn{flex:1}
.ts-cat-row .ts-cc{color:var(--text-disabled);font-size:var(--fs-2xs)}
.tasks-view .tv-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.tasks-view .tv-title{font-size:var(--fs-lg);font-weight:700}
.tasks-view .tv-count{font-size:var(--fs-xs);color:var(--text-tertiary)}
.task-group{margin-bottom:14px}
.task-group-head{font-size:var(--fs-xs);font-weight:700;color:var(--text-tertiary);padding:4px 0;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.task-group-head .tg-icon{font-size:var(--fs-sm)}
.task-group-head .tg-count{font-size:var(--fs-2xs);color:var(--text-disabled)}
.task-row{display:flex;align-items:center;padding:6px 10px;border-radius:var(--radius-sm);background:var(--bg-surface);margin-bottom:3px;gap:8px;transition:background .1s}
.task-row:hover{background:var(--bg-tint-1)}
.task-row .tr-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--text-disabled);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .1s}
.task-row .tr-check:hover{border-color:var(--success)}
.task-row .tr-check.checked{border-color:var(--success);background:var(--success);color:#000}
.task-row .tr-body{flex:1;min-width:0}
.task-row .tr-title{font-size:var(--fs-sm);font-weight:500}
.task-row .tr-sub{font-size:var(--fs-2xs);color:var(--text-tertiary);margin-top:1px}
.task-row .tr-cat{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.task-row .tr-deadline{font-size:var(--fs-2xs);font-weight:600;flex-shrink:0}
.task-row.done-row{opacity:.3}
.task-row.done-row .tr-title{text-decoration:line-through}

/* Horizon view */
.horizon-view{flex-direction:row;overflow:hidden}
.hz-board{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hz-toolbar{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--border);gap:8px}
.hz-toolbar .hz-title{font-size:var(--fs-lg);font-weight:700}
.hz-grid-wrap{flex:1;overflow:auto}
.hz-grid{border-collapse:collapse;width:100%}
.hz-grid th{position:sticky;top:0;z-index:5;background:var(--bg-base);padding:8px 4px;font-size:var(--fs-xs);font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;text-align:center;border-bottom:2px solid var(--border);min-width:100px}
.hz-grid th.current{color:var(--accent);border-bottom-color:var(--accent)}
.hz-grid th.name-col{text-align:left;padding-left:12px;min-width:160px;font-size:var(--fs-2xs);color:var(--text-disabled)}
.hz-grid td{padding:3px 4px;border-bottom:1px solid var(--border);vertical-align:middle;height:32px}
.hz-grid td.name-cell{padding-left:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.hz-grid td.name-cell .hz-name{display:flex;align-items:center;gap:6px}
.hz-grid td.name-cell .hz-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.hz-grid td.name-cell span{font-size:var(--fs-xs);font-weight:600;color:var(--text-secondary)}
.hz-grid td.name-cell .hz-rm-row{opacity:0;border:none;background:none;color:var(--text-disabled);cursor:pointer;font-size:10px;padding:0 2px;transition:opacity .1s}
.hz-grid tr:hover td.name-cell .hz-rm-row{opacity:1}
.hz-grid td.name-cell .hz-rm-row:hover{color:var(--error)}
.hz-grid td.month-cell{text-align:center;cursor:pointer;transition:background .1s;border-left:1px solid var(--border)}
.hz-grid td.month-cell:hover{background:var(--bg-tint-1)}
.hz-grid td.month-cell.current{background:rgba(212,168,67,.02)}
.hz-chip{display:inline-block;width:calc(100% - 6px);padding:4px 0;border-radius:var(--radius-sm);font-size:var(--fs-2xs);font-weight:600;text-align:center;transition:all .12s}
.hz-chip:hover{filter:brightness(1.2)}
.hz-grid tr.highlighted td{background:rgba(212,168,67,.04)}
.hz-grid tr.highlighted td.month-cell .hz-chip{outline:2px solid var(--accent);outline-offset:1px}
.hz-grid .hz-drop-row td{border:none;height:28px}
.hz-grid .hz-drop-row td.month-cell{border:1px dashed transparent;transition:all .12s}
.hz-grid .hz-drop-row td.month-cell.drag-over{border-color:var(--accent);background:rgba(212,168,67,.06)}
.hz-grid .hz-group-row td{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:0}
.hz-group-head{display:flex;align-items:center;gap:6px;padding:5px 12px;cursor:pointer;font-size:var(--fs-2xs);font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px}
.hz-group-head .hg-arrow{font-size:9px;color:var(--text-disabled)}
.hz-group-head .hg-cnt{font-weight:400;color:var(--text-disabled);margin-left:2px}
/* Backlog sidebar */
.hz-backlog{width:260px;flex-shrink:0;background:var(--bg-surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.hz-bl-header{padding:10px 12px;border-bottom:1px solid var(--border);font-size:var(--fs-sm);font-weight:700;color:var(--text-secondary)}
.hz-bl-scroll{flex:1;overflow-y:auto;padding:6px}
.hz-bl-section{margin-bottom:4px}
.hz-bl-sec-head{display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;font-size:var(--fs-2xs);font-weight:700;color:var(--text-disabled);text-transform:uppercase;letter-spacing:.5px}
.hz-bl-sec-head .hz-arrow{font-size:9px}
.hz-bl-sec-head .hz-sec-cnt{font-size:9px;font-weight:400;margin-left:auto}
.hz-bl-items{padding:0 2px}
.hz-bl-item{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:var(--radius-sm);cursor:grab;transition:all .1s;margin-bottom:2px}
.hz-bl-item:hover,.hz-bl-item.hl{background:var(--bg-tint-2);outline:1px solid var(--accent)}
.hz-bl-item .bl-color{width:3px;border-radius:2px;align-self:stretch;min-height:18px;flex-shrink:0}
.hz-bl-item .bl-title{font-size:var(--fs-xs);font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hz-bl-item .bl-dots{font-size:8px;color:var(--accent);flex-shrink:0;min-width:20px;text-align:right}

/* Review view */
.review-view{flex-direction:column;overflow-y:auto;align-items:center}
.rv-inner{width:100%;max-width:900px;padding:16px 24px}
.rv-header{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.rv-header h2{font-size:var(--fs-lg);font-weight:700}
.rv-header .rv-period{font-size:var(--fs-xs);color:var(--text-tertiary)}
.rv-tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:0}
.rv-tab{padding:6px 14px;font-size:var(--fs-xs);font-weight:600;color:var(--text-disabled);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .12s}
.rv-tab:hover{color:var(--text-tertiary)}
.rv-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.rv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.rv-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px}
.rv-card h4{font-size:var(--fs-sm);font-weight:700;color:var(--text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px}
.rv-card.span2{grid-column:span 2}
.rv-card.full{grid-column:1/-1}
.rv-stat{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
.rv-stat:last-child{border-bottom:none}
.rv-stat .rv-label{font-size:var(--fs-xs);color:var(--text-secondary)}
.rv-stat .rv-val{font-size:var(--fs-md);font-weight:700}
.rv-big{font-size:28px;font-weight:800;margin:4px 0 8px}
.rv-bar-wrap{margin:6px 0}
.rv-bar{height:6px;border-radius:3px;background:var(--bg-tint-1);overflow:hidden}
.rv-bar span{display:block;height:100%;border-radius:3px}
.rv-cad-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.rv-cad-row:last-child{border-bottom:none}
.rv-cad-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rv-cad-name{font-size:var(--fs-xs);flex:1}
.rv-cad-status{font-size:var(--fs-xs);font-weight:600}
.rv-cat-bar{display:flex;align-items:center;gap:6px;padding:3px 0}
.rv-cat-bar .rv-cat-label{font-size:var(--fs-xs);width:65px;color:var(--text-secondary)}
.rv-cat-bar .rv-cat-fill{flex:1;height:8px;border-radius:4px;background:var(--bg-tint-1)}
.rv-cat-bar .rv-cat-fill span{display:block;height:100%;border-radius:4px}
.rv-cat-bar .rv-cat-val{font-size:var(--fs-2xs);color:var(--text-tertiary);width:36px;text-align:right}
.rv-chart{display:flex;align-items:flex-end;gap:6px;height:100px;margin-top:8px;padding:0 4px}
.rv-chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0}
.rv-chart-bar{width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:1px}
.rv-chart-bar div{border-radius:2px;min-height:0}
.rv-chart-label{font-size:8px;color:var(--text-disabled);margin-top:3px}
.rv-gauge{display:flex;align-items:center;gap:10px;padding:6px 0}
.rv-gauge-ring{width:48px;height:48px;border-radius:50%;position:relative;flex-shrink:0}
.rv-gauge-ring svg{width:48px;height:48px;transform:rotate(-90deg)}
.rv-gauge-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:var(--fs-sm);font-weight:800}
.rv-gauge-info{flex:1}
.rv-gauge-info .rv-gi-title{font-size:var(--fs-xs);font-weight:600}
.rv-gauge-info .rv-gi-sub{font-size:9px;color:var(--text-tertiary)}

/* Nav add button */
.nav-add-btn{width:28px;height:28px;border-radius:var(--radius-sm);border:1px dashed var(--border-hover);background:none;color:var(--text-tertiary);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;margin-left:8px;transition:all .15s;line-height:1}
.nav-add-btn:hover{border-color:var(--accent);color:var(--accent);border-style:solid;background:rgba(212,168,67,.08)}

/* Category picker popup */
.cat-popup{position:fixed;z-index:350;background:var(--bg-tint-2);border:1px solid var(--border-hover);border-radius:var(--radius-md);padding:4px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:popIn .1s ease-out}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.cat-popup-item{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:var(--fs-xs);color:var(--text-secondary);transition:all .08s;white-space:nowrap}
.cat-popup-item:hover{background:var(--bg-tint-1);color:var(--text-primary)}
.cat-popup-item.active{color:var(--text-primary);background:rgba(255,255,255,.05)}
.cat-popup-item .cp-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

/* Entity edit popup (replaces detail panel) */
.entity-popup{position:fixed;z-index:280;background:var(--bg-surface);border:1px solid var(--border-hover);border-radius:var(--radius-lg);padding:14px;width:260px;box-shadow:0 12px 36px rgba(0,0,0,.5);animation:popIn .12s ease-out}
.ep-title{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.ep-title input{flex:1;background:none;border:none;border-bottom:1px solid transparent;color:var(--text-primary);font-size:var(--fs-md);font-weight:600;outline:none;padding:2px 0}
.ep-title input:focus{border-bottom-color:var(--accent)}
.ep-close{width:20px;height:20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-tertiary);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ep-close:hover{border-color:var(--border-hover);color:var(--text-primary)}
.ep-field{margin-bottom:8px}
.ep-label{font-size:var(--fs-2xs);color:var(--text-disabled);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ep-row{display:flex;align-items:center;gap:6px}
.ep-row select,.ep-row input{flex:1;padding:4px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tint-1);color:var(--text-primary);font-size:var(--fs-xs);outline:none}
.ep-row select:focus,.ep-row input:focus{border-color:var(--accent)}
.ep-cat-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:all .1s;position:relative}
.ep-cat-dot:hover{transform:scale(1.15)}
.ep-cat-dot.on{border-color:transparent;transform:scale(1.25)}
.ep-cat-dot.on::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.ep-cat-dot[data-tooltip]:hover::before{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg-tint-2);border:1px solid var(--border-hover);color:var(--text-primary);font-size:var(--fs-2xs);padding:2px 6px;border-radius:var(--radius-sm);white-space:nowrap;pointer-events:none;z-index:10}
.ep-prio{display:flex;gap:3px}
.ep-prio button{padding:3px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-tertiary);font-size:var(--fs-2xs);cursor:pointer;transition:all .1s}
.ep-prio button:hover{border-color:var(--border-hover)}
.ep-prio button.on{border-color:var(--accent);color:var(--accent);background:rgba(212,168,67,.08)}
.ep-actions{display:flex;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.ep-action{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-tertiary);font-size:var(--fs-2xs);cursor:pointer;transition:all .1s}
.ep-action:hover{border-color:var(--border-hover);color:var(--text-secondary)}
.ep-action.danger:hover{border-color:var(--error);color:var(--error)}

/* Direction project hover */
.dir-card .dc-proj{transition:all .1s;cursor:pointer;border-radius:var(--radius-sm);padding:2px 4px;margin:0 -4px}
.dir-card .dc-proj:hover{background:var(--bg-tint-1)}
.dc-proj .dc-unlink{opacity:0;border:none;background:none;color:var(--text-disabled);cursor:pointer;padding:0 2px;font-size:11px;transition:all .1s;flex-shrink:0}
.dc-proj:hover .dc-unlink{opacity:1}
.dc-proj .dc-unlink:hover{color:var(--error)}

/* Horizon hide/remove buttons */
.hz-grid td.name-cell .hz-actions{opacity:0;display:flex;gap:2px;transition:opacity .1s;flex-shrink:0}
.hz-grid tr:hover td.name-cell .hz-actions{opacity:1}
.hz-action-btn{width:20px;height:20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .1s;color:var(--text-disabled);padding:0}
.hz-action-btn:hover{border-color:var(--border-hover);color:var(--text-primary)}

const DAY_NAMES=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
function getWeekStart(offset){
  const d=new Date(TODAY);d.setDate(d.getDate()-((d.getDay()+6)%7)+offset*7);d.setHours(0,0,0,0);return d;
}
function getWeekDays(){
  const start=getWeekStart(weekOffset);
  return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(d.getDate()+i);return d});
}
function getDayLabels(){return getWeekDays().map(d=>`${DAY_NAMES[d.getDay()]} ${d.getDate()}`)}

  const days=getWeekDays();const s=days[0],e=days[6];
  const wn=Math.ceil(((s-new Date(s.getFullYear(),0,1))/864e5+new Date(s.getFullYear(),0,1).getDay()+1)/7);
  return `W${wn} · ${s.getDate()} ${MON_NAMES[s.getMonth()]} — ${e.getDate()} ${MON_NAMES[e.getMonth()]}`;
}

function recalcPool(){poolItems.forEach(pi=>{if(pi.splittable)pi.scheduled=blocks.filter(b=>b.pool===pi.id).reduce((s,b)=>s+b.dur/60,0);else pi.placed=blocks.some(b=>b.pool===pi.id)})}
recalcPool();

// ===== TABS =====

// ===== GRID =====
const dayBodyEls=[];
function buildGrid(){
  const g=document.getElementById('timeGutter');let h='<div style="height:32px"></div>';
  for(let r=0;r<TOTAL_ROWS;r++){const m=H_START*60+r*30;h+=`<div class="tl">${r%2===0?fmt(m):''}</div>`}g.innerHTML=h;
  const dc=document.getElementById('dayCols');dc.innerHTML='';
  for(let d=0;d<7;d++){
    const w=document.createElement('div');w.className='day-col-wrap';
    const hd=document.createElement('div');hd.className='day-head';hd.textContent=DAYS[d];
    const bd=document.createElement('div');bd.className='day-body';bd.dataset.day=d;bd.style.height=GRID_H+'px';
    for(let r=0;r<TOTAL_ROWS;r++){const ln=document.createElement('div');ln.className='hour-line';ln.style.top=r*ROW_H+'px';bd.appendChild(ln)}
    const ind=document.createElement('div');ind.className='drop-indicator';bd.appendChild(ind);
    w.appendChild(hd);w.appendChild(bd);dc.appendChild(w);dayBodyEls[d]=bd;
    bd.addEventListener('click',e=>{if(!e.target.closest('.block')){selBlock=null;renderBlocks()}});
  }
  renderBlocks();
}
function renderBlocks(){
  dayBodyEls.forEach(db=>db.querySelectorAll('.block').forEach(el=>el.remove()));
  blocks.forEach(b=>{
    const db=dayBodyEls[b.day];if(!db)return;
    const el=document.createElement('div');
    el.className='block'+(b.done?' done':'')+(selBlock===b.id?' selected':'');
    const top=(b.start-H_START*60)/30*ROW_H,ht=b.dur/30*ROW_H;
    el.style.cssText=`top:${top}px;height:${ht}px;background:${cc(b.cat)}15;border-color:${cc(b.cat)}`;
    el.innerHTML=`<div class="b-title">${b.title}</div>${ht>28?`<div class="b-time">${fmt(b.start)}–${fmt(b.start+b.dur)}</div>`:''}<div class="resize-handle"></div>`;
    el.addEventListener('click',e=>{e.stopPropagation();selBlock=b.id;renderBlocks()});
    el.addEventListener('contextmenu',e=>{e.preventDefault();showBlockMenu(e,b)});
    setupBlockDrag(el,b);
    el.querySelector('.resize-handle').addEventListener('mousedown',e=>{
      e.stopPropagation();e.preventDefault();const sy=e.clientY,od=b.dur;
      const mv=ev=>{b.dur=snap30(clamp(od+(ev.clientY-sy)/ROW_H*30,30,480));renderBlocks()};
      const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);recalcPool();renderBudget();renderSideList()};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
    db.appendChild(el);
  });
}
function setupBlockDrag(el,b){
  el.addEventListener('mousedown',e=>{
    if(e.target.closest('.resize-handle'))return;e.preventDefault();
    const rect=el.getBoundingClientRect(),offY=e.clientY-rect.top;
    const rects=dayBodyEls.map(d=>d.getBoundingClientRect());
    selBlock=b.id;let dragging=false,ghost=null;const sx=e.clientX,sy=e.clientY;
    const mv=ev=>{
      if(!dragging&&Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy)<5)return;
      if(!dragging){dragging=true;ghost=mkGhost(b.title,b.dur,b.cat);el.style.opacity='.3'}
      ghost.style.left=(ev.clientX-60)+'px';ghost.style.top=(ev.clientY-10)+'px';
      rects.forEach((r,d)=>{const ind=dayBodyEls[d].querySelector('.drop-indicator');
        if(ev.clientX>=r.left&&ev.clientX<=r.right){const m=snap30(clamp(H_START*60+(ev.clientY-r.top-offY)/ROW_H*30,H_START*60,H_END*60-b.dur));ind.style.display='block';ind.style.top=((m-H_START*60)/30*ROW_H)+'px'}else ind.style.display='none'});
    };
    const up=ev=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);
      if(ghost)ghost.remove();dayBodyEls.forEach(d=>d.querySelector('.drop-indicator').style.display='none');
      if(dragging){rects.forEach((r,d)=>{if(ev.clientX>=r.left&&ev.clientX<=r.right){b.day=d;b.start=snap30(clamp(H_START*60+(ev.clientY-r.top-offY)/ROW_H*30,H_START*60,H_END*60-b.dur))}})}
      renderBlocks();
    };
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}
function mkGhost(title,dur,cat){
  const g=document.createElement('div');g.className='ghost-block';
  g.style.cssText=`width:120px;height:${dur/30*ROW_H}px;background:${cc(cat)}25;border-color:${cc(cat)}`;
  g.innerHTML=`<div style="font-size:10px;font-weight:600;padding:3px 6px;color:${cc(cat)}">${title}</div>`;
  document.body.appendChild(g);return g;
}

// ===== GENERIC DRAG TO GRID =====
function setupDragToGrid(el,title,dur,cat,poolId){
  el.addEventListener('mousedown',e=>{
    if(e.target.closest('.s-act'))return;e.preventDefault();
    const rects=dayBodyEls.map(d=>d.getBoundingClientRect());
    let dragging=false,ghost=null;const sx=e.clientX,sy=e.clientY;
    const mv=ev=>{
      if(!dragging&&Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy)<5)return;
      if(!dragging){dragging=true;ghost=mkGhost(title,dur,cat)}
      ghost.style.left=(ev.clientX-60)+'px';ghost.style.top=(ev.clientY-10)+'px';
      rects.forEach((r,d)=>{const ind=dayBodyEls[d].querySelector('.drop-indicator');
        if(ev.clientX>=r.left&&ev.clientX<=r.right){const m=snap30(clamp(H_START*60+(ev.clientY-r.top)/ROW_H*30,H_START*60,H_END*60-dur));ind.style.display='block';ind.style.top=((m-H_START*60)/30*ROW_H)+'px'}else ind.style.display='none'});
    };
    const up=ev=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);
      if(ghost)ghost.remove();dayBodyEls.forEach(d=>d.querySelector('.drop-indicator').style.display='none');
      if(!dragging)return;
      rects.forEach((r,d)=>{if(ev.clientX>=r.left&&ev.clientX<=r.right){
        const m=snap30(clamp(H_START*60+(ev.clientY-r.top)/ROW_H*30,H_START*60,H_END*60-dur));
        blocks.push({id:'b'+(nxtB++),title,day:d,start:m,dur,cat,pool:poolId||null,done:false});
        recalcPool();renderBlocks();renderSideList();renderBudget();
      }});
    };
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}

function showBlockMenu(e,b){
  hideMenu();const m=document.createElement('div');m.className='ctx-menu';m.id='ctxMenu';
  m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';
  m.innerHTML=`<button data-a="done">${b.done?'Не готово':'✓ Готово'}</button><button data-a="dup">Дублировать</button><button data-a="del" style="color:var(--error)">Удалить</button>`;
  document.body.appendChild(m);
  m.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
    if(btn.dataset.a==='done')b.done=!b.done;
    if(btn.dataset.a==='dup')blocks.push({...b,id:'b'+(nxtB++),start:b.start+b.dur});
    if(btn.dataset.a==='del'){blocks=blocks.filter(x=>x.id!==b.id);if(selBlock===b.id)selBlock=null;recalcPool()}
    hideMenu();renderBlocks();renderBudget();renderSideList();
  });
  setTimeout(()=>document.addEventListener('click',hideMenu,{once:true}),10);
}
function hideMenu(){const m=document.getElementById('ctxMenu');if(m)m.remove()}
document.addEventListener('keydown',e=>{if(selBlock&&(e.key==='Delete'||e.key==='Backspace')){blocks=blocks.filter(b=>b.id!==selBlock);selBlock=null;recalcPool();renderBlocks();renderBudget();renderSideList()}});

// ===== SIDEBAR RENDERING =====
function renderSideList(){
  const L=document.getElementById('sideList');L.innerHTML='';
  if(sideTab==='pool')renderSidePool(L);
  else if(sideTab==='tasks')renderSideTasks(L);
  else if(sideTab==='projects')renderSideProjects(L);
  else renderSideDirs(L);
}

function renderSidePool(L){
  const sp=poolItems.filter(p=>p.splittable),at=poolItems.filter(p=>!p.splittable);
  if(sp.length){L.appendChild(mkSec('Дробимые'))}
  sp.forEach(pi=>{
    const done=pi.scheduled>=pi.hours,pct=Math.min(100,pi.scheduled/pi.hours*100),c=cc(pi.cat);
    const el=mkItem(c);
    el.querySelector('.s-body').innerHTML=`<div class="s-title" style="${done?'text-decoration:line-through;opacity:.5':''}">${pi.title}</div><div class="s-meta">${pi.scheduled.toFixed(1)} / ${pi.hours}ч</div><div class="s-bar"><span style="width:${pct}%;background:${c}"></span></div>`;
    const del=document.createElement('button');del.className='s-act';del.textContent='×';del.title='Убрать из пула';
    del.onclick=e=>{e.stopPropagation();blocks=blocks.filter(b=>b.pool!==pi.id);poolItems=poolItems.filter(x=>x.id!==pi.id);renderBlocks();renderSideList();renderBudget()};
    el.appendChild(del);
    setupDragToGrid(el,pi.title,60,pi.cat,pi.id);
    L.appendChild(el);
  });
  if(at.length){L.appendChild(mkSec('Атомарные'))}
  at.forEach(pi=>{
    const c=cc(pi.cat);const el=mkItem(c);if(pi.placed)el.classList.add('placed');
    el.querySelector('.s-body').innerHTML=`<div class="s-title" style="${pi.placed?'text-decoration:line-through;opacity:.5':''}">${pi.title}</div><div class="s-meta">${pi.hours}ч</div>`;
    if(pi.placed){const badge=document.createElement('span');badge.className='s-badge';badge.style.cssText='background:rgba(48,216,136,.15);color:var(--success)';badge.textContent='✓';el.appendChild(badge)}
    const del=document.createElement('button');del.className='s-act';del.textContent='×';del.title='Убрать';
    del.onclick=e=>{e.stopPropagation();blocks=blocks.filter(b=>b.pool!==pi.id);poolItems=poolItems.filter(x=>x.id!==pi.id);renderBlocks();renderSideList();renderBudget()};
    el.appendChild(del);
    if(!pi.placed)setupDragToGrid(el,pi.title,pi.hours*60,pi.cat,pi.id);
    L.appendChild(el);
  });
}

function renderSideTasks(L){
  const sorted=[...tasks].filter(t=>!t.done).sort((a,b)=>{
    const da=daysUntil(a.deadline)??999,db=daysUntil(b.deadline)??999;
    const pa={high:0,medium:1,low:2}[a.prio]??3,pb={high:0,medium:1,low:2}[b.prio]??3;
    return(da<0?da*3:da)+pa*20-((db<0?db*3:db)+pb*20);
  });
  sorted.forEach(t=>{
    const c=cc(t.cat),dl=daysUntil(t.deadline),el=mkItem(c);el.classList.add('draggable');
    const dlStr=dl!==null?(dl<0?`${-dl}д просрочено`:dl===0?'сегодня':`${dl}д`):'';
    el.querySelector('.s-body').innerHTML=`<div class="s-title">${t.title}</div><div class="s-meta">${{high:'⚡',medium:'●',low:'○'}[t.prio]||''} ${dlStr?`<span class="${urgClass(dl)}">${dlStr}</span>`:''}</div>`;
    // → add to weekly pool
    const inPool=poolItems.some(pi=>pi.title===t.title);
    const btn=document.createElement('button');btn.className='s-act'+(inPool?' in':'');btn.textContent=inPool?'✓':'→';btn.title=inPool?'В пуле':'В пул недели';
    btn.onclick=e=>{e.stopPropagation();
      if(inPool){const pi=poolItems.find(x=>x.title===t.title);if(pi){blocks=blocks.filter(b=>b.pool!==pi.id);poolItems=poolItems.filter(x=>x.id!==pi.id)}}
      else poolItems.push({id:'p'+(nxtPi++),title:t.title,hours:1,cat:t.cat,splittable:false,placed:false});
      recalcPool();renderSideList();renderBudget()};
    el.appendChild(btn);
    setupDragToGrid(el,t.title,60,t.cat,null);
    L.appendChild(el);
  });
  const done=tasks.filter(t=>t.done);
  if(done.length){L.appendChild(mkSec(`Готово (${done.length})`));
    done.forEach(t=>{const el=mkItem(cc(t.cat));el.classList.add('done-item');
      el.querySelector('.s-body').innerHTML=`<div class="s-title">${t.title}</div>`;L.appendChild(el)});
  }
}

function renderSideProjects(L){
  const sorted=[...projects].sort((a,b)=>a.la-b.la);
  sorted.forEach(p=>{
    const c=cc(p.cat),el=mkItem(c);el.classList.add('draggable');
    const board=boards.find(b=>b.id===p.bid);
    const colName=board?board.columns[p.col]:'?';
    const stale=p.la>=14;
    el.querySelector('.s-body').innerHTML=`<div class="s-title">${p.title}</div><div class="s-meta"><span>${colName}</span><span class="${stale?'urgency-bad':''}">${p.la}д</span></div>`;
    const inPool=poolItems.some(pi=>pi.projectId===p.id);
    const btn=document.createElement('button');btn.className='s-act'+(inPool?' in':'');btn.textContent=inPool?'✓':'→';btn.title=inPool?'В пуле':'В пул недели';
    btn.onclick=e=>{e.stopPropagation();
      if(inPool){const pi=poolItems.find(x=>x.projectId===p.id);if(pi){blocks=blocks.filter(b=>b.pool!==pi.id);poolItems=poolItems.filter(x=>x.id!==pi.id)}}
      else poolItems.push({id:'p'+(nxtPi++),title:p.title,hours:4,cat:p.cat,splittable:true,scheduled:0,projectId:p.id});
      recalcPool();renderSideList();renderBudget()};
    el.appendChild(btn);
    L.appendChild(el);
  });
}

function renderSideDirs(L){
  directions.forEach(dir=>{
    const c=cc(dir.cat),el=mkItem(c);
    const hasCad=dir.cadence!==null;
    let meta='';
    if(dir.progress!==null)meta=`${dir.current} → ${dir.target}`;
    if(hasCad){
      const ds=Math.round((TODAY-new Date(dir.lastAct))/864e5),over=ds-dir.cadence;
      meta=`${dir.cadLbl} · <span class="${over>0?'urgency-bad':over>-3?'urgency-warn':'urgency-ok'}">${ds}д назад</span>`;
    }
    if(!meta)meta=cl(dir.cat);
    el.querySelector('.s-body').innerHTML=`<div class="s-title">${dir.title}</div><div class="s-meta">${meta}</div>`;
    if(dir.progress!==null){
      const bar=document.createElement('div');bar.className='s-bar';bar.style.marginTop='3px';
      bar.innerHTML=`<span style="width:${dir.progress}%;background:${c}"></span>`;
      el.querySelector('.s-body').appendChild(bar);
    }
    // Cadence check button
    if(hasCad){
      const btn=document.createElement('button');btn.className='s-act';btn.textContent='✓';btn.title='Отметить';btn.style.cssText='color:var(--success);border-color:var(--success)';
      btn.onclick=e=>{e.stopPropagation();dir.lastAct='2026-04-28';renderSideList();renderContext()};
      el.appendChild(btn);
    }
    // Pool toggle
    const linked=projects.filter(p=>p.dirId===dir.id);
    const inPool=linked.length?poolItems.some(pi=>pi.projectId&&linked.some(p=>p.id===pi.projectId)):poolItems.some(pi=>pi.directionId===dir.id);
    const pbtn=document.createElement('button');pbtn.className='s-act'+(inPool?' in':'');pbtn.textContent=inPool?'✓':'→';
    pbtn.onclick=e=>{e.stopPropagation();toggleDirPool(dir,linked);renderSideList();renderBudget()};
    el.appendChild(pbtn);
    L.appendChild(el);
  });
}

function mkSec(text){const d=document.createElement('div');d.className='pool-section';d.textContent=text;return d}
function mkItem(color){
  const el=document.createElement('div');el.className='s-item';
  el.innerHTML=`<div class="s-color" style="background:${color}"></div><div class="s-body"></div>`;
  return el;
}

// ===== BUDGET =====
function renderBudget(){
  const tot=(H_END-H_START)*7,bH=blocks.reduce((s,b)=>s+b.dur/60,0),fr=tot-bH;
  const pRem=poolItems.reduce((s,pi)=>{if(pi.splittable)return s+Math.max(0,pi.hours-(pi.scheduled||0));if(!pi.placed)return s+pi.hours;return s},0);
  const sl=fr-pRem,bP=Math.min(100,bH/tot*100),pP=Math.min(100-bP,pRem/tot*100),sP=Math.max(0,100-bP-pP);
  document.getElementById('budgetArea').innerHTML=`
    <div class="budget-row" style="color:var(--text-tertiary)"><span>Занято</span><span>${bH.toFixed(1)} ч</span></div>
    <div class="budget-row" style="font-weight:600"><span>Свободно</span><span>${fr.toFixed(1)} ч</span></div>
    <div class="budget-row indent"><span><span class="dot" style="background:var(--accent)"></span>Пул</span><span style="font-weight:600;color:var(--accent)">${pRem.toFixed(1)} ч</span></div>
    <div class="budget-row indent"><span><span class="dot" style="background:${sl>=0?'var(--success)':'var(--error)'}"></span>Люфт</span><span style="font-weight:600;color:${sl>=0?'var(--success)':'var(--error)'}">${sl.toFixed(1)} ч</span></div>
    <div class="budget-bar"><span style="width:${bP}%;background:var(--text-disabled)"></span><span style="width:${pP}%;background:var(--accent)"></span><span style="width:${sP}%;background:var(--success)"></span></div>`;
}

// ===== TASKS VIEW =====
let taskFilter=null; // {type:'cat',val:'work'} | {type:'prio',val:'high'} | {type:'overdue'} | {type:'week'} | {type:'done'} | null
let taskSearch=''; // text search by title
function renderTasksView(){
  const V=document.getElementById('view-tasks');V.innerHTML='<div class="tasks-inner" id="tasksInner"></div><div class="tasks-side" id="tasksSide"></div>';
  const TI=document.getElementById('tasksInner');
  const active=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done);
  const filterLabel=taskFilter?({
    cat:cl(taskFilter.val),prio:{high:'⚡ Высокий',medium:'● Средний',low:'○ Низкий'}[taskFilter.val],
    overdue:'Просроченные',week:'На этой неделе',done:'Выполненные'
  }[taskFilter.type]||''):'';
  TI.innerHTML=`<div class="tv-head"><span class="tv-title">Задачи</span><span class="tv-count">${active.length} активных${filterLabel?` · <span style="color:var(--accent);cursor:pointer" id="tvClearFilter">✕ ${filterLabel}</span>`:''}</span></div>`;
  const clearBtn=TI.querySelector('#tvClearFilter');
  if(clearBtn)clearBtn.onclick=()=>{taskFilter=null;taskSearch='';renderTasksView()};
  // Build sidebar
  const TS=document.getElementById('tasksSide');
  const catCounts={};active.forEach(t=>{catCounts[t.cat]=(catCounts[t.cat]||0)+1});
  const prioCounts={high:0,medium:0,low:0};active.forEach(t=>{prioCounts[t.prio]=(prioCounts[t.prio]||0)+1});
  const overdue=active.filter(t=>{const d=daysUntil(t.deadline);return d!==null&&d<0}).length;
  const dueWeek=active.filter(t=>{const d=daysUntil(t.deadline);return d!==null&&d>=0&&d<=7}).length;
  const isF=(type,val)=>taskFilter&&taskFilter.type===type&&(!val||taskFilter.val===val);
  const fStyle=(type,val)=>isF(type,val)?'background:var(--bg-tint-2);border-radius:var(--radius-sm)':'';
  let sideHtml=`<div class="ts-card"><h4>Обзор</h4>
    <div class="ts-stat-row" style="cursor:pointer;${fStyle('all')}" data-f="all"><span>Все</span><span class="ts-val">${active.length}</span></div>
    <div class="ts-stat-row" style="cursor:pointer;${fStyle('done')}" data-f="done"><span>Выполнено</span><span class="ts-val" style="color:var(--success)">${done.length}</span></div>
    ${overdue?`<div class="ts-stat-row" style="cursor:pointer;${fStyle('overdue')}" data-f="overdue"><span>Просрочено</span><span class="ts-val" style="color:var(--error)">${overdue}</span></div>`:''}
    ${dueWeek?`<div class="ts-stat-row" style="cursor:pointer;${fStyle('week')}" data-f="week"><span>На этой неделе</span><span class="ts-val" style="color:var(--warning)">${dueWeek}</span></div>`:''}
  </div><div class="ts-card"><h4>По категориям</h4>`;
  ['work','growth','life','people','health'].forEach(ck=>{
    const cnt=catCounts[ck]||0;if(!cnt)return;
    sideHtml+=`<div class="ts-cat-row" style="${fStyle('cat',ck)}" data-f="cat" data-fv="${ck}"><div class="ts-cd" style="background:${cc(ck)}"></div><span class="ts-cn">${cl(ck)}</span><span class="ts-cc">${cnt}</span></div>`;
  });
  sideHtml+=`</div><div class="ts-card"><h4>По приоритету</h4>
    <div class="ts-stat-row" style="cursor:pointer;${fStyle('prio','high')}" data-f="prio" data-fv="high"><span>⚡ Высокий</span><span class="ts-val">${prioCounts.high}</span></div>
    <div class="ts-stat-row" style="cursor:pointer;${fStyle('prio','medium')}" data-f="prio" data-fv="medium"><span>● Средний</span><span class="ts-val">${prioCounts.medium}</span></div>
    <div class="ts-stat-row" style="cursor:pointer;${fStyle('prio','low')}" data-f="prio" data-fv="low"><span>○ Низкий</span><span class="ts-val">${prioCounts.low}</span></div>
  </div>`;
  TS.innerHTML=sideHtml;
  // Setup filter clicks
  TS.querySelectorAll('[data-f]').forEach(el=>{
    el.style.cursor='pointer';
    el.addEventListener('mouseenter',()=>{if(!isF(el.dataset.f,el.dataset.fv))el.style.background='var(--bg-tint-1)'});
    el.addEventListener('mouseleave',()=>{if(!isF(el.dataset.f,el.dataset.fv))el.style.background=''});
    el.onclick=()=>{
      const f=el.dataset.f,v=el.dataset.fv;
      if(f==='all'){taskFilter=null}
      else if(f==='done'){taskFilter=isF('done')?null:{type:'done'}}
      else if(f==='overdue'){taskFilter=isF('overdue')?null:{type:'overdue'}}
      else if(f==='week'){taskFilter=isF('week')?null:{type:'week'}}
      else if(f==='cat'){taskFilter=isF('cat',v)?null:{type:'cat',val:v}}
      else if(f==='prio'){taskFilter=isF('prio',v)?null:{type:'prio',val:v}}
      renderTasksView();
    };
  });
  // Alias V to inner for rest of function
  const _V=TI;
  // Apply task filter
  const applyFilter=(list)=>{
    let r=list;
    if(taskSearch){const q=taskSearch.toLowerCase();r=r.filter(t=>t.title.toLowerCase().includes(q))}
    if(!taskFilter)return r;
    switch(taskFilter.type){
      case 'cat':return r.filter(t=>t.cat===taskFilter.val);
      case 'prio':return r.filter(t=>t.prio===taskFilter.val);
      case 'overdue':return r.filter(t=>{const d=daysUntil(t.deadline);return d!==null&&d<0});
      case 'week':return r.filter(t=>{const d=daysUntil(t.deadline);return d!==null&&d>=0&&d<=7});
      case 'done':return [];// done tasks shown separately below
      default:return r;
    }
  };
  const filteredActive=applyFilter(active);
  const showDone=taskFilter&&taskFilter.type==='done';
  const groups=[
    {label:'🔥 Горит',icon:'',filter:t=>{const d=daysUntil(t.deadline);return d!==null&&d<=2}},
    {label:'⚡ Срочно',icon:'',filter:t=>{const d=daysUntil(t.deadline);return d!==null&&d>2&&d<=7}},
    {label:'📋 Скоро',icon:'',filter:t=>{const d=daysUntil(t.deadline);return d!==null&&d>7&&d<=30}},
    {label:'💤 Когда-нибудь',icon:'',filter:t=>{const d=daysUntil(t.deadline);return d===null||d>30}},
  ];
  groups.forEach(g=>{
    const items=filteredActive.filter(g.filter).sort((a,b)=>{
      const pa={high:0,medium:1,low:2}[a.prio]??3,pb={high:0,medium:1,low:2}[b.prio]??3;
      if(pa!==pb)return pa-pb;
      return(daysUntil(a.deadline)??999)-(daysUntil(b.deadline)??999);
    });
    if(!items.length)return;
    const sec=document.createElement('div');sec.className='task-group';
    sec.innerHTML=`<div class="task-group-head"><span>${g.label}</span><span class="tg-count">${items.length}</span></div>`;
    items.forEach(t=>{
      const dl=daysUntil(t.deadline);
      const dlStr=dl!==null?(dl<0?`${-dl}д просрочено`:dl===0?'сегодня':`${dl}д`):'';
      const row=document.createElement('div');row.className='task-row';
      row.innerHTML=`<div class="tr-check" data-id="${t.id}"></div><div class="tr-body"><div class="tr-title">${t.title}</div><div class="tr-sub">${{high:'⚡ Высокий',medium:'● Средний',low:'○ Низкий'}[t.prio]||''}</div></div><span class="tr-deadline ${urgClass(dl)}">${dlStr}</span><div class="tr-cat" style="background:${cc(t.cat)}"></div>`;
      row.querySelector('.tr-check').onclick=(e)=>{e.stopPropagation();t.done=true;renderTasksView();renderSideList()};
      row.onclick=(e)=>{if(e.target.closest('.tr-check'))return;openEntityPopup('task',t,row)};
      row.style.cursor='pointer';
      sec.appendChild(row);
    });
    _V.appendChild(sec);
  });
  if(taskFilter&&!showDone&&!filteredActive.length){
    const emp=document.createElement('div');emp.style.cssText='padding:40px 0;text-align:center;opacity:.4;font-size:var(--fs-sm)';
    emp.textContent='Нет задач по этому фильтру';_V.appendChild(emp);
  }
  if(done.length&&(!taskFilter||showDone)){
    const sec=document.createElement('div');sec.className='task-group';
    sec.innerHTML=`<div class="task-group-head"><span>✓ Готово</span><span class="tg-count">${done.length}</span></div>`;
    done.forEach(t=>{
      const row=document.createElement('div');row.className='task-row done-row';
      row.innerHTML=`<div class="tr-check checked" data-id="${t.id}">✓</div><div class="tr-body"><div class="tr-title">${t.title}</div></div><div class="tr-cat" style="background:${cc(t.cat)}"></div>`;
      row.querySelector('.tr-check').onclick=()=>{t.done=false;renderTasksView();renderSideList()};
      sec.appendChild(row);
    });
    _V.appendChild(sec);
  }
}

// ===== CONTEXT VIEW =====
function renderContext(){

  ['work','growth','people','health','life'].forEach(ck=>{
    const dirs=directions.filter(d=>d.cat===ck);if(!dirs.length)return;

      const c=cc(dir.cat),linked=projects.filter(p=>p.dirId===dir.id);
      const hasCad=dir.cadence!==null,hasMeas=dir.progress!==null;
      let body='';
      if(hasMeas){
        body+=`<div class="dc-progress"><span style="width:${dir.progress}%;background:${c}"></span></div>`;
        body+=`<div class="dc-meta">${dir.current} → ${dir.target}</div>`;
        if(dir.deadline){const dl=daysUntil(dir.deadline);body+=`<div class="dc-meta">Дедлайн: <span class="${urgClass(dl)}">${dir.deadline} (${dl}д)</span></div>`}
      }
      if(hasCad){
        const ds=Math.round((TODAY-new Date(dir.lastAct))/864e5),over=ds-dir.cadence;
        const cls=over>0?'urgency-bad':over>-3?'urgency-warn':'urgency-ok';
        body+=`<div class="dc-meta">${dir.cadLbl} · <span class="${cls}">${ds}д назад${over>0?' · просрочено '+over+'д':''}</span></div>`;
      }
      if(!hasCad&&!hasMeas&&!linked.length)body+=`<div class="dc-meta" style="font-style:italic;opacity:.5">нет проектов</div>`;
      if(linked.length){
        body+=`<div class="dc-projects"><div class="dc-meta" style="font-weight:600">${linked.length} проект${linked.length>1?(linked.length<5?'а':'ов'):''}</div>`;
        linked.forEach(p=>{const laClass=p.la<=3?'fresh':p.la>=14?'stale':'normal';const laTooltip=p.la===0?'Активность сегодня':p.la===1?'Вчера':'Последняя активность '+p.la+' дн. назад';body+=`<div class="dc-proj" data-pid="${p.id}"><span>${p.title}</span><span class="dc-days ${laClass}" data-tooltip="${laTooltip}"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" style="opacity:.6"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3.5l2.5 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>${p.la}д</span><button class="dc-unlink" title="Отвязать от направления" data-uid="${p.id}"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M4 7L7 4M3 5.5L1.8 6.7a1.5 1.5 0 0 0 2.1 2.1L5.5 7M5.5 4L6.7 2.8a1.5 1.5 0 0 1 2.1 2.1L7 6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M1.5 1.5l8 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity=".5"/></svg></button></div>`});
        body+=`</div>`;
      }
      const inPool=linked.length?poolItems.some(pi=>pi.projectId&&linked.some(p=>p.id===pi.projectId)):poolItems.some(pi=>pi.directionId===dir.id);
      const card=document.createElement('div');card.className='dir-card';
      card.innerHTML=`<div class="dc-top"><div class="dc-dot" style="background:${c}"></div><div class="dc-title">${dir.title}</div></div>${body}<div class="dc-actions"><button class="btn-pool ${inPool?'in':''}">${inPool?'✓ В пуле':'→ В пул'}</button>${hasCad?'<button class="btn-cadence">✓ Отметить</button>':''}</div>`;
      card.querySelector('.btn-pool').onclick=ev=>{ev.stopPropagation();toggleDirPool(dir,linked);renderContext();renderSideList();renderBudget();renderBlocks()};
      const cb=card.querySelector('.btn-cadence');
      if(cb)cb.onclick=ev=>{ev.stopPropagation();dir.lastAct='2026-04-28';renderContext();renderSideList()};
      // Unlink buttons on projects
      card.querySelectorAll('.dc-unlink').forEach(ub=>{
        ub.onclick=ev=>{ev.stopPropagation();
          const p=projects.find(x=>x.id===ub.dataset.uid);
          if(p){p.dirId=null;toast('Отвязано: '+p.title,p.cat);renderContext();renderProjects();renderSideList()}
        };
      });
      grid.appendChild(card);
    });
    sec.appendChild(head);sec.appendChild(grid);V.appendChild(sec);
  });
}

function toggleDirPool(dir,linked){
  if(linked.length){
    const best=[...linked].sort((a,b)=>a.la-b.la)[0];
    if(poolItems.some(pi=>pi.projectId===best.id)){
      const pi=poolItems.find(x=>x.projectId===best.id);if(pi)blocks=blocks.filter(b=>b.pool!==pi.id);
      poolItems=poolItems.filter(x=>x.projectId!==best.id);
    }else poolItems.push({id:'p'+(nxtPi++),title:best.title,hours:4,cat:best.cat,splittable:true,scheduled:0,projectId:best.id});
  }else{
    const ex=poolItems.find(pi=>pi.directionId===dir.id);
    if(ex){blocks=blocks.filter(b=>b.pool!==ex.id);poolItems=poolItems.filter(x=>x.id!==ex.id)}
    else poolItems.push({id:'p'+(nxtPi++),title:dir.title,hours:2,cat:dir.cat,splittable:true,scheduled:0,projectId:null,directionId:dir.id});
  }
  recalcPool();
}

// ===== HORIZON VIEW =====
const MONTHS=['Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

const hzData={};

hzData['pr3']=[1];hzData['pr5']=[1,2];hzData['pr10']=[1];hzData['pr13']=[1];hzData['pr16']=[1,2];
hzData['pr6']=[3,4,5];hzData['pr14']=[2,3];hzData['pr15']=[2];hzData['pr20']=[2];
hzData['pr8']=[4,5];hzData['pr17']=[3];
// backlog priority: active / someday / deferred
const hzPrio={};
projects.forEach(p=>{
  if(p.la<=14&&p.col>0)hzPrio[p.id]='active';
  else if(p.la>=30)hzPrio[p.id]='deferred';

});
// Override for realism
['pr1','pr2','pr4','pr9','pr19','pr16','pr3','pr5','pr10','pr20','pr15'].forEach(id=>hzPrio[id]='active');
['pr6','pr14','pr13','pr17','pr8'].forEach(id=>hzPrio[id]='someday');
['pr7','pr11','pr12','pr18','pr21'].forEach(id=>hzPrio[id]='deferred');

// Project size for horizon grouping
const hzSize={};
['pr1','pr16','pr17','pr18','pr20','pr6','pr14','pr9','pr11','pr12'].forEach(id=>hzSize[id]='big');
['pr2','pr3','pr4','pr5','pr8','pr10','pr13','pr15'].forEach(id=>hzSize[id]='mid');
['pr7','pr21','pr19'].forEach(id=>hzSize[id]='small');
const hzGroups=[
  {key:'big',label:'Тяжёлые проекты',icon:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 12L4.5 4L7 8L9.5 2L13 12Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="currentColor" fill-opacity=".15"/></svg>'},
  {key:'mid',label:'Средние проекты',icon:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="4" width="10" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M5 4V3a2 2 0 0 1 4 0v1" stroke="currentColor" stroke-width="1.3"/></svg>'},
  {key:'small',label:'Мелкие проекты',icon:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8 1L5 7h4L6 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'},
];
const hzGroupCollapsed={big:false,mid:false,small:false};

let hzHighlight=null; // fixed highlight pid
const hzHidden=new Set(); // hidden (not deleted) from board — state preserved
const hzSections=[
  {key:'active',label:'Актуальное',icon:'●'},
  {key:'someday',label:'Когда-нибудь',icon:'○'},
  {key:'deferred',label:'Скрытое',icon:'⏸'},
];
const hzCollapsed={active:false,someday:false,deferred:true};

function renderHorizon(){
  const V=document.getElementById('view-horizon');V.innerHTML='';
  const MC=8;
  // Board area (left)
  const board=document.createElement('div');board.className='hz-board';
  const tb=document.createElement('div');tb.className='hz-toolbar';
  tb.innerHTML=`<span class="hz-title">Горизонт</span>`;
  board.appendChild(tb);
  const wrap=document.createElement('div');wrap.className='hz-grid-wrap';
  // Build table
  const table=document.createElement('table');table.className='hz-grid';
  // Header
  let hdr='<thead><tr><th class="name-col">Проект</th>';
  for(let m=0;m<MC;m++)hdr+=`<th class="${m===0?'current':''}">${MONTHS[m]}${m===0?' · сейчас':''}</th>`;
  hdr+='</tr></thead>';
  table.innerHTML=hdr;
  const tbody=document.createElement('tbody');
  const onBoard=projects.filter(p=>(hzData[p.id]||[]).length>0&&!hzHidden.has(p.id));

  function addProjectRow(p){
    const c=cc(p.cat),months=hzData[p.id]||[];
    const tr=document.createElement('tr');tr.dataset.pid=p.id;
    if(hzHighlight===p.id)tr.classList.add('highlighted');
    const nameTd=document.createElement('td');nameTd.className='name-cell';
    nameTd.innerHTML=`<div class="hz-name"><div class="hz-dot" style="background:${c}"></div><span>${p.title}</span><div class="hz-actions"><button class="hz-action-btn" title="Скрыть (стейт сохранится)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6s2-4 5-4 5 4 5 4-2 4-5 4S1 6 1 6z" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="6" r="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 10L10 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></button><button class="hz-action-btn danger" title="Удалить с доски (очистить)"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button></div></div>`;
    // Hide button (preserves state)
    nameTd.querySelectorAll('.hz-action-btn')[0].onclick=e=>{e.stopPropagation();hzHidden.add(p.id);hzPrio[p.id]='deferred';renderHorizon()};
    // Delete button (clears state)
    nameTd.querySelectorAll('.hz-action-btn')[1].onclick=e=>{e.stopPropagation();hzData[p.id]=[];renderHorizon()};
    tr.appendChild(nameTd);
    for(let m=0;m<MC;m++){
      const td=document.createElement('td');td.className='month-cell'+(m===0?' current':'');
      if(months.includes(m))td.innerHTML=`<div class="hz-chip" style="background:${c}20;color:${c}">●</div>`;
      td.onclick=()=>{if(!hzData[p.id])hzData[p.id]=[];
        if(hzData[p.id].includes(m))hzData[p.id]=hzData[p.id].filter(x=>x!==m);else hzData[p.id].push(m);renderHorizon()};
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  // Group by size
  hzGroups.forEach(g=>{
    const groupProjs=onBoard.filter(p=>(hzSize[p.id]||'mid')===g.key);
    if(!groupProjs.length)return;
    // Group header row
    const gtr=document.createElement('tr');gtr.className='hz-group-row';
    const gtd=document.createElement('td');gtd.colSpan=MC+1;
    gtd.innerHTML=`<div class="hz-group-head"><span class="hg-arrow">${hzGroupCollapsed[g.key]?'▶':'▼'}</span>${g.icon} ${g.label}<span class="hg-cnt">${groupProjs.length}</span></div>`;
    gtd.querySelector('.hz-group-head').onclick=()=>{hzGroupCollapsed[g.key]=!hzGroupCollapsed[g.key];renderHorizon()};
    gtr.appendChild(gtd);tbody.appendChild(gtr);
    if(!hzGroupCollapsed[g.key])groupProjs.forEach(p=>addProjectRow(p));
  });

  // Drop row at bottom
  const dropTr=document.createElement('tr');dropTr.className='hz-drop-row';
  const dropName=document.createElement('td');dropName.className='name-cell';
  dropName.innerHTML=`<span style="font-size:var(--fs-2xs);color:var(--text-disabled);font-style:italic">перетащи сюда ↓</span>`;
  dropTr.appendChild(dropName);
  for(let m=0;m<MC;m++){
    const td=document.createElement('td');td.className='month-cell';td.dataset.month=m;
    td.addEventListener('dragover',e=>{e.preventDefault();td.classList.add('drag-over')});
    td.addEventListener('dragleave',()=>td.classList.remove('drag-over'));
    td.addEventListener('drop',e=>{e.preventDefault();td.classList.remove('drag-over');
      const pid=e.dataTransfer.getData('text/plain');
      if(pid){if(!hzData[pid])hzData[pid]=[];if(!hzData[pid].includes(m))hzData[pid].push(m);hzHidden.delete(pid);hzPrio[pid]='active';renderHorizon()}});
    dropTr.appendChild(td);
  }
  tbody.appendChild(dropTr);
  table.appendChild(tbody);
  // Also allow drop on existing month cells
  wrap.appendChild(table);
  board.appendChild(wrap);
  V.appendChild(board);
  // Also set up dragover on all month cells for existing rows
  table.querySelectorAll('td.month-cell').forEach(td=>{
    td.addEventListener('dragover',e=>e.preventDefault());
    td.addEventListener('drop',e=>{
      e.preventDefault();
      const pid=e.dataTransfer.getData('text/plain');
      const m=parseInt(td.dataset.month||td.cellIndex-1);
      if(pid&&!isNaN(m)){if(!hzData[pid])hzData[pid]=[];if(!hzData[pid].includes(m))hzData[pid].push(m);hzHidden.delete(pid);hzPrio[pid]='active';renderHorizon()}
    });
  });
  // Backlog sidebar (right)
  const bl=document.createElement('div');bl.className='hz-backlog';
  bl.innerHTML=`<div class="hz-bl-header">Бэклог</div>`;
  const scroll=document.createElement('div');scroll.className='hz-bl-scroll';
  // Dynamic section logic: active = on board & not hidden, someday = not on board, deferred = hidden
  const dynSections=[
    {key:'active',label:'Актуальное',icon:'●',filter:p=>(hzData[p.id]||[]).length>0&&!hzHidden.has(p.id)},
    {key:'someday',label:'Когда-нибудь',icon:'○',filter:p=>(hzData[p.id]||[]).length===0&&!hzHidden.has(p.id)},
    {key:'deferred',label:'Скрытое',icon:'⏸',filter:p=>hzHidden.has(p.id)},
  ];
  dynSections.forEach(sec=>{
    const secProjs=projects.filter(sec.filter);
    if(!secProjs.length)return;
    const section=document.createElement('div');section.className='hz-bl-section';
    const head=document.createElement('div');head.className='hz-bl-sec-head';
    head.innerHTML=`<span class="hz-arrow">${hzCollapsed[sec.key]?'▶':'▼'}</span> ${sec.icon} ${sec.label} <span class="hz-sec-cnt">${secProjs.length}</span>`;
    const items=document.createElement('div');items.className='hz-bl-items';
    items.style.display=hzCollapsed[sec.key]?'none':'block';
    head.onclick=()=>{hzCollapsed[sec.key]=!hzCollapsed[sec.key];items.style.display=hzCollapsed[sec.key]?'none':'block';head.querySelector('.hz-arrow').textContent=hzCollapsed[sec.key]?'▶':'▼'};
    secProjs.forEach(p=>{
      const c=cc(p.cat),months=hzData[p.id]||[];
      const item=document.createElement('div');item.className='hz-bl-item';item.draggable=true;item.dataset.pid=p.id;
      if(hzHighlight===p.id)item.classList.add('hl');
      const isHidden=hzHidden.has(p.id);
      const monthsStr=months.length?months.sort((a,b)=>a-b).map(m=>MONTHS[m]).join(' '):'';
      item.innerHTML=`<div class="bl-color" style="background:${c}"></div><span class="bl-title">${p.title}</span>${monthsStr?`<span class="bl-dots" style="${isHidden?'color:var(--text-disabled)':''}">${monthsStr}</span>`:''}`;
      if(isHidden)item.style.opacity='.6';
      item.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',p.id);item.style.opacity='.4'});
      item.addEventListener('dragend',()=>{item.style.opacity=isHidden?'.6':'1'});
      item.addEventListener('mouseenter',()=>{if(!hzHighlight)highlightRow(p.id)});
      item.addEventListener('mouseleave',()=>{if(!hzHighlight)clearRowHighlight()});
      item.addEventListener('click',e=>{e.stopPropagation();
        if(isHidden){hzHidden.delete(p.id);renderHorizon();return}
        hzHighlight=hzHighlight===p.id?null:p.id;renderHorizon()});
      items.appendChild(item);
    });
    section.appendChild(head);section.appendChild(items);scroll.appendChild(section);
  });
  bl.appendChild(scroll);
  V.appendChild(bl);
  board.addEventListener('click',e=>{if(!e.target.closest('td')&&hzHighlight){hzHighlight=null;renderHorizon()}});
}

function highlightRow(pid){
  document.querySelectorAll('.hz-grid tr[data-pid]').forEach(tr=>tr.classList.toggle('highlighted',tr.dataset.pid===pid));
  document.querySelectorAll('.hz-bl-item').forEach(i=>i.classList.toggle('hl',i.dataset.pid===pid));
