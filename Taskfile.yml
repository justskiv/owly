version: "3"

# Taskfile for Owly.
# Run: `task <name>` or `task` (prints the list).
# Install go-task: `brew install go-task/tap/go-task`.

silent: true

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install npm dependencies
    cmds:
      - npm install

  dev:
    desc: Run Tauri + Vite in dev mode (opens the app window)
    cmds:
      - npm run tauri dev

  web:
    desc: Run Vite dev server only (no Tauri), frontend on :1420
    cmds:
      - npm run dev

  typecheck:
    desc: TypeScript type-check without emit
    cmds:
      - npx tsc --noEmit

  fe:build:
    desc: Build frontend only (tsc + vite build → dist/)
    cmds:
      - npm run build

  build:
    desc: Build installer bundle (Tauri → src-tauri/target/)
    cmds:
      - npm run tauri build

  preview:
    desc: Serve the built frontend from dist/
    cmds:
      - npm run preview

  seed:
    desc: Generate sample data into data/
    cmds:
      - npm run seed

  tauri:info:
    desc: Tauri environment diagnostics (Rust, system deps)
    cmds:
      - npm run tauri info

  clean:
    desc: Remove build artifacts (dist/, src-tauri/target/)
    cmds:
      - rm -rf dist
      - rm -rf src-tauri/target

  clean:all:
    desc: Full clean — build artifacts + node_modules
    deps: [clean]
    cmds:
      - rm -rf node_modules

  test:
    desc: Run vitest unit tests
    cmds:
      - npm test

  test:coverage:
    desc: Run vitest with coverage (text + lcov + html in coverage/)
    cmds:
      - npx vitest run --coverage

  rust:test:
    desc: Run Rust unit tests in src-tauri
    dir: src-tauri
    cmds:
      - cargo test --lib --quiet

  lint:
    desc: ESLint with --max-warnings=0
    cmds:
      - npx eslint . --max-warnings=0

  check:
    desc: Pre-commit sanity check (typecheck + lint + rust:test + test + fe:build)
    cmds:
      - task: typecheck
      - task: lint
      - task: rust:test
      - task: test
      - task: fe:build

  release:
    desc: Bump version, tag, push — triggers GH Actions release build
    summary: |
      Usage: task release -- 0.2.0
      Bumps package.json + Cargo.toml + Cargo.lock, commits, tags, and
      pushes. The release workflow on the remote builds and signs the
      .app, uploads it to a draft GitHub Release with latest.json.
    cmds:
      - node scripts/bump.mjs {{.CLI_ARGS}}
      - git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock
      - 'git commit -m "release: v{{.CLI_ARGS}}"'
      - git tag v{{.CLI_ARGS}}
      - git push origin main
      - git push origin v{{.CLI_ARGS}}
